<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
<meta name="theme-color" content="#1C2028">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Avon Traders">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Avon Traders</title>
<style>
:root{
  --concrete:#EDEAE3;      /* warm light bg */
  --paper:#FFFFFF;
  --ink:#1B1A17;           /* near black warm */
  --steel:#2A303B;         /* structural dark */
  --steel-2:#3A4250;
  --galv:#6B7785;          /* muted steel */
  --line:#D8D2C7;          /* hairline */
  --ochre:#D4791B;         /* safety amber - primary */
  --ochre-deep:#B5640F;
  --wa:#1FA855;            /* whatsapp green */
  --wa-deep:#178A45;
  --due:#C0392B;           /* balance due red */
  --ok:#2E7D46;
  --shadow:0 1px 0 rgba(0,0,0,.04), 0 8px 24px -16px rgba(27,26,23,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans",sans-serif;
  background:var(--steel);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  font-size:16px;line-height:1.4;
}
#app{
  max-width:560px;margin:0 auto;min-height:100vh;background:var(--concrete);
  position:relative;display:flex;flex-direction:column;
  box-shadow:0 0 60px rgba(0,0,0,.35);
}
.tabular{font-variant-numeric:tabular-nums;}
.mono{font-feature-settings:"tnum";font-variant-numeric:tabular-nums;}

/* ---------- top bar ---------- */
.topbar{
  background:var(--steel);color:#fff;padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
  position:sticky;top:0;z-index:30;border-bottom:3px solid var(--ochre);
}
.topbar .brand{display:flex;align-items:center;gap:11px;}
.hexmark{width:34px;height:34px;flex:0 0 34px;}
.brand-txt h1{
  font-size:18px;margin:0;font-weight:800;letter-spacing:.14em;text-transform:uppercase;line-height:1;
}
.brand-txt p{margin:2px 0 0;font-size:10.5px;color:#aeb6c2;letter-spacing:.06em;text-transform:uppercase;}
.topbar .meta{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:8px;}
.chip{
  font-size:11px;letter-spacing:.04em;background:rgba(255,255,255,.08);color:#cfd6df;
  padding:5px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;
}
.chip.amber{background:rgba(212,121,27,.16);color:#f0b070;}
.chip b{color:#fff;font-weight:700;}

/* ---------- content ---------- */
main{flex:1;padding:14px 14px 96px;}
.section-eyebrow{
  font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--galv);
  font-weight:700;margin:18px 2px 8px;display:flex;align-items:center;gap:8px;
}
.section-eyebrow:first-child{margin-top:2px;}
.section-eyebrow .ln{flex:1;height:1px;background:var(--line);}

.card{
  background:var(--paper);border:1px solid var(--line);border-radius:12px;
  box-shadow:var(--shadow);overflow:hidden;
}
.card + .card{margin-top:10px;}
.card-pad{padding:14px;}

/* quick search */
.searchwrap{position:relative;margin-bottom:4px;}
.searchwrap input{
  width:100%;border:1.5px solid var(--line);background:var(--paper);border-radius:12px;
  padding:14px 14px 14px 44px;font-size:16px;font-weight:600;color:var(--ink);box-shadow:var(--shadow);
}
.searchwrap input:focus{outline:none;border-color:var(--ochre);}
.searchwrap .ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--galv);font-size:18px;}
.searchwrap .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--galv);font-size:22px;padding:6px 10px;cursor:pointer;}

/* result rows */
.rate-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);}
.rate-row:last-child{border-bottom:none;}
.rate-row .nm{font-weight:700;flex:1;min-width:0;}
.rate-row .nm small{display:block;font-weight:500;color:var(--galv);font-size:11.5px;letter-spacing:.03em;text-transform:uppercase;margin-top:2px;}
.rate-row .price{font-weight:800;font-size:17px;white-space:nowrap;}
.rate-row .price small{font-weight:600;color:var(--galv);font-size:11px;}
.rate-row.low{background:#fdf3ef;}

.badge{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:3px 7px;border-radius:5px;display:inline-block;}
.badge.feat{background:var(--ochre);color:#fff;}
.badge.low{background:#fbe3dc;color:var(--due);}
.badge.out{background:var(--due);color:#fff;}
.badge.due{background:#fbe3dc;color:var(--due);}
.badge.paid{background:#e0f0e5;color:var(--ok);}
.badge.partial{background:#fdeede;color:var(--ochre-deep);}
.badge.cat{background:#eef0f3;color:var(--steel-2);}

/* buttons */
.btn{
  appearance:none;border:none;border-radius:11px;font-weight:800;letter-spacing:.02em;
  padding:14px 16px;font-size:15px;cursor:pointer;display:inline-flex;align-items:center;
  justify-content:center;gap:8px;width:100%;transition:transform .04s ease, filter .15s;
}
.btn:active{transform:scale(.985);}
.btn.primary{background:var(--ochre);color:#fff;}
.btn.steel{background:var(--steel);color:#fff;}
.btn.wa{background:var(--wa);color:#fff;}
.btn.ghost{background:transparent;color:var(--steel-2);border:1.5px solid var(--line);}
.btn.danger{background:#fff;color:var(--due);border:1.5px solid #eccfca;}
.btn.sm{padding:10px 12px;font-size:13px;border-radius:9px;width:auto;}
.btn.tiny{padding:7px 10px;font-size:12px;border-radius:8px;width:auto;gap:5px;}
.btn-row{display:flex;gap:8px;}
.btn-row .btn{flex:1;}

/* stat tiles */
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tile{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:13px 14px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.tile::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--galv);}
.tile.amber::before{background:var(--ochre);}
.tile.red::before{background:var(--due);}
.tile.green::before{background:var(--ok);}
.tile .lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--galv);font-weight:700;}
.tile .val{font-size:23px;font-weight:800;margin-top:3px;}
.tile .val small{font-size:13px;font-weight:600;color:var(--galv);}

/* featured / promo */
.promo{
  background:linear-gradient(135deg,var(--steel) 0%, #1d2733 100%);color:#fff;border-radius:14px;
  padding:16px;position:relative;overflow:hidden;border:1px solid #0e141b;
}
.promo::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;
  background:radial-gradient(circle, rgba(212,121,27,.32), transparent 70%);}
.promo .tag{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ochre);font-weight:800;}
.promo h3{margin:6px 0 4px;font-size:19px;letter-spacing:.02em;}
.promo p{margin:0;font-size:13px;color:#c4ccd6;}
.promo .pills{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px;}
.promo .pp{font-size:11.5px;font-weight:700;background:rgba(255,255,255,.1);padding:6px 10px;border-radius:8px;}

/* lists / items */
.list-item{display:flex;gap:12px;align-items:center;padding:13px 14px;border-bottom:1px solid var(--line);}
.list-item:last-child{border-bottom:none;}
.li-main{flex:1;min-width:0;}
.li-main .t{font-weight:700;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.li-main .s{font-size:12px;color:var(--galv);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;}
.li-right{text-align:right;white-space:nowrap;}
.li-right .p{font-weight:800;font-size:16px;}
.li-right .m{font-size:11px;color:var(--ok);font-weight:700;}

/* forms */
label.fld{display:block;margin-bottom:12px;}
label.fld .lab{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--steel-2);margin-bottom:5px;display:block;}
.inp,select.inp,textarea.inp{
  width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px;font-size:16px;
  font-family:inherit;color:var(--ink);background:var(--paper);
}
.inp:focus{outline:none;border-color:var(--ochre);}
textarea.inp{resize:vertical;min-height:64px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.switch{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 0;border-top:1px solid var(--line);}
.switch .lab{font-weight:700;font-size:14px;}
.switch .sub{font-size:12px;color:var(--galv);font-weight:500;margin-top:2px;}
.toggle{width:48px;height:28px;border-radius:999px;background:#cfcabf;position:relative;flex:0 0 48px;cursor:pointer;transition:background .15s;}
.toggle.on{background:var(--ochre);}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
.toggle.on::after{left:23px;}

/* bottom sheet / modal */
.sheet-bg{position:fixed;inset:0;background:rgba(20,22,28,.55);z-index:50;display:none;align-items:flex-end;justify-content:center;}
.sheet-bg.show{display:flex;}
.sheet{
  background:var(--concrete);width:100%;max-width:560px;border-radius:18px 18px 0 0;
  max-height:92vh;overflow-y:auto;padding:8px 14px calc(env(safe-area-inset-bottom) + 18px);
  animation:up .22s ease;
}
@keyframes up{from{transform:translateY(40px);opacity:.6;}to{transform:translateY(0);opacity:1;}}
.sheet-grab{width:40px;height:4px;border-radius:3px;background:#cabfb0;margin:8px auto 4px;}
.sheet h2{font-size:18px;margin:6px 2px 14px;letter-spacing:.02em;display:flex;align-items:center;justify-content:space-between;}
.sheet h2 .x{background:none;border:none;font-size:26px;color:var(--galv);cursor:pointer;line-height:1;padding:0 4px;}

/* line items in bill */
.lineitem{display:flex;gap:8px;align-items:center;padding:10px 0;border-bottom:1px dashed var(--line);}
.lineitem .nm{flex:1;min-width:0;font-weight:700;font-size:14px;}
.lineitem .nm small{display:block;color:var(--galv);font-weight:500;font-size:11.5px;}
.qtybox{display:flex;align-items:center;border:1.5px solid var(--line);border-radius:9px;overflow:hidden;}
.qtybox button{width:32px;height:36px;border:none;background:#f1ede5;font-size:18px;font-weight:800;color:var(--steel-2);cursor:pointer;}
.qtybox input{width:42px;border:none;text-align:center;font-weight:800;font-size:15px;padding:0;}
.lineitem .amt{font-weight:800;width:74px;text-align:right;font-size:14px;}
.lineitem .rm{background:none;border:none;color:var(--due);font-size:18px;padding:4px 2px;cursor:pointer;}

/* invoice preview */
.doc{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;font-size:13px;color:#222;box-shadow:var(--shadow);}
.doc .dh{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--steel);padding-bottom:10px;}
.doc .dh h3{margin:0;font-size:18px;letter-spacing:.1em;text-transform:uppercase;}
.doc .dh p{margin:2px 0 0;font-size:11px;color:#666;}
.doc table{width:100%;border-collapse:collapse;margin-top:10px;}
.doc th{text-align:left;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:#888;border-bottom:1px solid #ddd;padding:6px 4px;}
.doc td{padding:7px 4px;border-bottom:1px solid #eee;font-size:12.5px;vertical-align:top;}
.doc td.r,.doc th.r{text-align:right;}
.doc .tot{display:flex;justify-content:space-between;padding:3px 0;font-size:13px;}
.doc .tot.g{font-weight:800;font-size:16px;border-top:2px solid var(--steel);margin-top:6px;padding-top:8px;}
.doc .terms{margin-top:12px;font-size:10.5px;color:#777;border-top:1px dashed #ccc;padding-top:8px;}
.doc .terms b{color:#444;display:block;margin-bottom:3px;letter-spacing:.05em;text-transform:uppercase;font-size:10px;}

/* empty state */
.empty{text-align:center;padding:36px 20px;color:var(--galv);}
.empty .big{font-size:34px;margin-bottom:8px;}
.empty p{margin:4px 0;font-size:14px;}

/* banner */
.banner{display:flex;gap:10px;align-items:center;background:#fdf3e7;border:1px solid #f0d9b8;border-radius:11px;padding:11px 13px;margin-bottom:10px;}
.banner .bi{font-size:20px;}
.banner .bt{flex:1;font-size:13px;font-weight:600;color:#8a5a13;}
.banner.green{background:#eaf5ee;border-color:#bfe0cb;}
.banner.green .bt{color:#1f6b3a;}

/* bottom nav */
.bottomnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;
  background:var(--steel);display:flex;z-index:40;border-top:1px solid #0e141b;
  padding-bottom:env(safe-area-inset-bottom);
}
.navbtn{flex:1;background:none;border:none;color:#8b95a3;padding:9px 4px 8px;font-size:10.5px;font-weight:700;
  letter-spacing:.03em;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;}
.navbtn .ni{font-size:20px;line-height:1;}
.navbtn.active{color:var(--ochre);}
.navbtn.fab{color:#fff;}
.navbtn.fab .ni{background:var(--ochre);width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:-14px;box-shadow:0 6px 14px -4px rgba(212,121,27,.7);font-size:24px;}

/* toast */
#toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;
  padding:12px 18px;border-radius:10px;font-size:13.5px;font-weight:600;opacity:0;transition:.25s;z-index:60;pointer-events:none;max-width:90%;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.muted{color:var(--galv);}
.right{text-align:right;}
.hr{height:1px;background:var(--line);margin:14px 0;}
.spacer{height:8px;}
.center{text-align:center;}
.flex{display:flex;align-items:center;gap:8px;}
.between{display:flex;align-items:center;justify-content:space-between;gap:8px;}
a.link{color:var(--ochre-deep);font-weight:700;text-decoration:none;}

@media print{
  body{background:#fff;}
  #app{box-shadow:none;}
  .topbar,.bottomnav,#toast,.no-print{display:none !important;}
  main{padding:0;}
}

/* lock screen */
#lockscreen{position:fixed;inset:0;z-index:200;background:var(--steel);display:none;
  flex-direction:column;align-items:center;justify-content:center;padding:24px;}
#lockscreen.show{display:flex;}
.lockbox{width:100%;max-width:300px;text-align:center;color:#fff;}
.lockbox h2{font-size:18px;font-weight:700;letter-spacing:.03em;margin:14px 0 18px;}
.pindots{display:flex;gap:14px;justify-content:center;height:18px;margin-bottom:8px;}
.pindots .d{width:14px;height:14px;border-radius:50%;border:2px solid #6B7785;}
.pindots .d.on{background:var(--ochre);border-color:var(--ochre);}
.lockmsg{font-size:13px;color:#e08a8a;min-height:18px;margin-bottom:14px;font-weight:600;}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.keypad button{height:62px;border-radius:50%;border:none;background:#343b48;color:#fff;font-size:24px;font-weight:700;cursor:pointer;}
.keypad button:active{background:#3f4756;}
.keypad button.fn{background:transparent;font-size:15px;font-weight:700;color:#9aa4b2;}
.thumb{width:46px;height:46px;border-radius:9px;object-fit:cover;border:1px solid var(--line);background:#f1ede5;flex:0 0 46px;}
.thumb-sm{width:30px;height:30px;border-radius:6px;object-fit:cover;flex:0 0 30px;}
.menu-row{display:flex;align-items:center;gap:13px;padding:15px 14px;border-bottom:1px solid var(--line);cursor:pointer;}
.menu-row:last-child{border-bottom:none;}
.menu-row .mi{font-size:22px;width:30px;text-align:center;}
.menu-row .mt{flex:1;font-weight:700;font-size:15px;}
.menu-row .ms{font-size:12px;color:var(--galv);font-weight:500;margin-top:1px;}
.menu-row .ar{color:var(--galv);font-size:20px;}
.rep-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.rep-card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:13px 14px;box-shadow:var(--shadow);}
.rep-card .l{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--galv);font-weight:700;}
.rep-card .v{font-size:20px;font-weight:800;margin-top:3px;}
.rep-card .c{font-size:11px;color:var(--galv);margin-top:2px;}
.bar-row{display:flex;align-items:center;gap:9px;margin:7px 0;}
.bar-row .bl{width:64px;font-size:12px;font-weight:700;color:var(--steel-2);flex:0 0 64px;}
.bar-track{flex:1;height:9px;background:#e7e2d8;border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;background:var(--ochre);border-radius:5px;}
.bar-row .bv{font-size:12px;font-weight:700;width:78px;text-align:right;flex:0 0 78px;}
.seg{display:flex;gap:6px;background:#e7e2d8;border-radius:10px;padding:4px;margin:10px 0;}
.seg button{flex:1;border:none;background:none;padding:8px;border-radius:7px;font-weight:700;font-size:12.5px;color:var(--steel-2);cursor:pointer;}
.seg button.on{background:#fff;color:var(--ochre-deep);box-shadow:var(--shadow);}
</style>
</head>

  <header class="topbar">
    <div class="brand">

  </div>
</div>
<script>

'use strict';

/* ---- storage with safe in-memory fallback (so preview never crashes) ---- */
var Store=(function(){
  var mem={}, ok=true;
  try{ var k='__t'; localStorage.setItem(k,'1'); localStorage.removeItem(k); }catch(e){ ok=false; }
  return {
    persistent:ok,
    get:function(k){ try{ return ok?localStorage.getItem(k):(mem[k]??null);}catch(e){return mem[k]??null;} },
    set:function(k,v){ try{ if(ok)localStorage.setItem(k,v); else mem[k]=v;}catch(e){mem[k]=v;} },
  };
})();

var DB_KEY='avon_traders_db_v1';

var DEFAULTS={

  },

/* ---------- helpers ---------- */
function inr(n){
  n=Number(n)||0;
  var neg=n<0; n=Math.abs(n);
  var s=n.toFixed(2).replace(/\.00$/,'');
  var parts=s.split('.'); var x=parts[0];
  var last3=x.slice(-3), rest=x.slice(0,-3);
  if(rest) last3=','+last3;
  rest=rest.replace(/\B(?=(\d{2})+(?!\d))/g,',');
  var out=rest+last3+(parts[1]?'.'+parts[1]:'');
  return (neg?'-':'')+'₹'+out;
}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function todayStr(){var d=new Date();return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function fmtDate(ts){return new Date(ts).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function fmtTime(ts){return new Date(ts).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});}
function fmtDateTime(ts){return fmtDate(ts)+', '+fmtTime(ts);}
function nowISO(){return new Date().toISOString();}
function daysSince(ts){ if(!ts) return 999; return Math.floor((Date.now()-ts)/86400000); }
function cleanPhone(p){ p=String(p||'').replace(/\D/g,''); if(p.length===10) p='91'+p; return p; }
function byId(id){return DB.items.find(function(x){return x.id===id;});}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm=setTimeout(function(){t.classList.remove('show');},2200);
}
function openWA(phone,text){
  var p=cleanPhone(phone);
  var url='https://wa.me/'+(p||'')+'?text='+encodeURIComponent(text);
  window.open(url,'_blank');
}

function wireQuickSearch(){
  var inp=document.getElementById('qsearch'), res=document.getElementById('qresults'), clr=document.getElementById('qclr');
  if(!inp) return;
  function run(){
    var q=inp.value.trim().toLowerCase();
    clr.style.display=q?'block':'none';
    if(!q){ res.innerHTML=''; return; }
    var m=DB.items.filter(function(i){return (i.name+' '+i.cat).toLowerCase().indexOf(q)>=0;})
                  .sort(function(a,b){return a.name.localeCompare(b.name);}).slice(0,12);
    if(!m.length){ res.innerHTML='<div class="card card-pad muted center">No item matches “'+esc(q)+'”. <a class="link" onclick="openItemForm()">Add it?</a></div>'; return; }
    res.innerHTML='<div class="card" style="margin-top:8px">'+m.map(rateRowHTML).join('')+'</div>';
  }
  inp.addEventListener('input',run);
  clr.addEventListener('click',function(){inp.value='';run();inp.focus();});
}

function itemListHTML(q){

  var arr=DB.items.filter(function(i){
    if(lowOnly && i.stock>i.min) return false;
    if(itemFilter!=='all' && i.cat!==itemFilter) return false;

    return true;
  }).sort(function(a,b){
    if((b.feat?1:0)!==(a.feat?1:0)) return (b.feat?1:0)-(a.feat?1:0);
    return a.name.localeCompare(b.name);
  });
  if(!arr.length) return '<div class="empty"><div class="big">📦</div><p>No items here.</p><p class="muted">Tap “Add New Item” to create one.</p></div>';

        thumb+

          (i.feat?' <span class="badge feat">★ Special</span>':'')+
          (i.rentable?' <span class="badge cat">🔁 Rent</span>':'')+
          (i.stock<=0?' <span class="badge out">OUT</span>':(i.stock<=i.min?' <span class="badge low">LOW</span>':''))+
        '</div>'+
        '<div class="s"><span class="badge cat">'+esc(i.cat)+'</span>'+
          '<span>Buy '+inr(i.buy)+'</span><span>Stock '+i.stock+' '+esc(i.unit)+'</span></div></div>'+
        '<div class="li-right"><div class="p tabular">'+inr(i.sell)+'</div>'+
          '<div class="m">'+(margin>=0?'+':'')+inr(margin)+' ('+mpct+'%)</div></div>'+
        '</div>';
  });
  h+='</div>';
  return h;
}

function onItemPhoto(input){
  var f=input.files&&input.files[0]; if(!f) return;
  var rd=new FileReader();
  rd.onload=function(){
    var img=new Image();
    img.onload=function(){
      var max=400, w=img.width, hh=img.height;
      if(w>hh){ if(w>max){ hh=Math.round(hh*max/w); w=max; } }
      else { if(hh>max){ w=Math.round(w*max/hh); hh=max; } }
      var cv=document.createElement('canvas'); cv.width=w; cv.height=hh;
      cv.getContext('2d').drawImage(img,0,0,w,hh);
      var data=cv.toDataURL('image/jpeg',0.7);
      var prev=document.getElementById('f_photo_prev');
      prev.src=data; prev.style.display='block';
      var ph=document.getElementById('f_photo_ph'); if(ph) ph.style.display='none';
    };
    img.src=rd.result;
  };
  rd.readAsDataURL(f);
}
function clearItemPhoto(){
  var prev=document.getElementById('f_photo_prev'); prev.src=''; prev.style.display='none';
  var ph=document.getElementById('f_photo_ph'); if(ph) ph.style.display='flex';
}
function currentItemPhoto(){

function billTotals(){
  var sub=bill.lines.reduce(function(a,l){return a+l.rate*l.qty;},0);
  var disc=Number(bill.discount)||0;
  var del=bill.delivery?(Number(bill.delCharge)||0):0;
  var grand=Math.max(0,sub-disc+del);
  var paid=bill.type==='invoice'?(Number(bill.paid)||0):0;
  var bal=Math.max(0,grand-paid);
  return {sub:sub,disc:disc,del:del,grand:grand,paid:paid,bal:bal};
}

/* ---- aggregate customers from invoices ---- */
function customerList(){
  var map={};
  DB.invoices.forEach(function(x){
    var key=(x.cust.name||'').trim().toLowerCase()+'|'+cleanPhone(x.cust.phone);
    if(!key.trim()) return;
    if(!map[key]) map[key]={name:x.cust.name,phone:x.cust.phone,bal:0,count:0};
    if(x.type==='invoice'){ map[key].bal+=x.balance||0; map[key].count++; }
  });
  return Object.keys(map).map(function(k){return map[k];}).sort(function(a,b){return b.bal-a.bal;});
}

/* ---- finalize ---- */
function finalizeBill(action){
  if(!bill.lines.length){ toast('Add at least one item'); return; }
  var t=billTotals();
  var isInv=bill.type==='invoice';
  var no = isInv ? ('AVT-INV-'+String(DB.invSeq).padStart(4,'0')) : ('AVT-QT-'+String(DB.quoteSeq).padStart(4,'0'));
  var rec={
    id:'b'+Date.now(), no:no, type:bill.type, date:bill.date, lang:bill.lang||'en',
    cust:{name:bill.cust.name.trim()||'Cash', phone:bill.cust.phone.trim(), addr:(bill.cust.addr||'').trim()},
    lines:bill.lines.map(function(l){return {id:l.id,name:l.name,unit:l.unit,rate:l.rate,qty:l.qty,amount:l.rate*l.qty};}),
    sub:t.sub, discount:t.disc, delivery:bill.delivery, delCharge:t.del, delAddr:bill.delAddr,
    total:t.grand, paid:t.paid, balance:t.bal, delivered:false,
    terms:DB.terms.slice()
  };
  // commit
  if(isInv){
    DB.invSeq++;
    // decrement stock for known items
    rec.lines.forEach(function(l){ if(l.id){ var it=byId(l.id); if(it){ it.stock=Math.max(0,(it.stock||0)-l.qty); } } });
  }else{ DB.quoteSeq++; }
  DB.invoices.unshift(rec);
  saveDB();

  var lowNow=lowStockItems();
  if(isInv && lowNow.length){ toast(no+' saved · '+lowNow.length+' item(s) now low on stock'); }
  else toast(no+' saved');

  if(action==='wa') shareBillWA(rec);
  else if(action==='pdf') exportBillPDF(rec);
  else { go('khata'); openBillView(rec.id); }
}

/* ---- WhatsApp text document ---- */
function billText(rec){
  var lg=rec.lang||'en';
  var L=[]; var line='— — — — — — — — — — —';
  L.push('*'+DB.shop.name.toUpperCase()+'*');
  L.push(DB.shop.addr);
  if(DB.shop.gst) L.push(DB.shop.gst);
  L.push('📞 '+DB.shop.phone);
  L.push(line);
  L.push(rec.type==='invoice'?('*'+L_(lg,'invoice')+'*  '+rec.no):('*'+L_(lg,'quote')+'*  '+rec.no));
  L.push(L_(lg,'date')+': '+fmtDate(rec.date)+'   '+L_(lg,'time')+': '+fmtTime(rec.date));
  if(rec.cust.name) L.push(L_(lg,'to')+': '+rec.cust.name);
  if(rec.cust.addr) L.push(L_(lg,'addr')+': '+rec.cust.addr);
  if(rec.cust.phone) L.push('📞 '+rec.cust.phone);
  L.push(line);
  rec.lines.forEach(function(l,i){
    L.push((i+1)+'. '+l.name);
    L.push('    '+l.qty+' '+l.unit+' × '+inr(l.rate)+' = *'+inr(l.amount)+'*');
  });
  L.push(line);
  L.push(L_(lg,'subtotal')+': '+inr(rec.sub));
  if(rec.discount) L.push(L_(lg,'discount')+': −'+inr(rec.discount));
  if(rec.delCharge) L.push(L_(lg,'delivery')+': '+inr(rec.delCharge));
  L.push('*'+L_(lg,'total')+': '+inr(rec.total)+'*');
  if(rec.type==='invoice'){
    L.push(L_(lg,'paid')+': '+inr(rec.paid));
    L.push('*'+L_(lg,'balance')+': '+inr(rec.balance)+'*');
  }
  if(rec.delivery && rec.delAddr){ L.push(line); L.push('🚚 '+L_(lg,'deliverTo')+': '+rec.delAddr); }
  L.push(line);
  L.push('_'+L_(lg,'terms')+'_');
  rec.terms.forEach(function(t){ L.push('• '+t); });
  L.push(line);
  L.push(L_(lg,'thanks')+' — '+DB.shop.name);
  return L.join('\n');
}
function L_(lg,key){ return L(lg,key); }
function shareBillWA(rec){ openWA(rec.cust.phone, billText(rec)); }

/* ---- PDF via jsPDF (lazy) ---- */
var _jspdf=null;
function loadJsPDF(){
  return new Promise(function(res,rej){
    if(window.jspdf&&window.jspdf.jsPDF){return res(window.jspdf.jsPDF);}
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=function(){ (window.jspdf&&window.jspdf.jsPDF)?res(window.jspdf.jsPDF):rej(); };
    s.onerror=rej; document.head.appendChild(s);
  });
}
function exportBillPDF(rec){
  if((rec.lang||'en')!=='en'){
    toast('Opening print view for '+LANGS[rec.lang]+' — choose “Save as PDF”');
    printBill(rec); return;
  }
  toast('Building PDF…');

    y+=22;
    // table head
    doc.setFillColor(42,48,59); doc.rect(m,y-12,W-2*m,20,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
    doc.text('#',m+6,y+2); doc.text('ITEM',m+26,y+2); doc.text('QTY',W-220,y+2,{align:'right'});

function inrPlain(n){ return 'Rs '+(Number(n)||0).toLocaleString('en-IN'); }

function sharePDF(blob,fn,rec){
  var file=new File([blob],fn,{type:'application/pdf'});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file],title:rec.no,text:DB.shop.name+' '+rec.no}).catch(function(){ dlBlob(blob,fn); });
  }else{ dlBlob(blob,fn); toast('PDF downloaded — attach it in WhatsApp'); }
}
function dlBlob(blob,fn){ var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=fn; a.click(); setTimeout(function(){URL.revokeObjectURL(a.href);},4000); }

function applyPayment(id){
  var x=DB.invoices.find(function(i){return i.id===id;});
  var amt=parseFloat(document.getElementById('pay_amt').value)||0;
  if(amt<=0){toast('Enter amount');return;}
  x.paid=Math.min(x.total,(x.paid||0)+amt); x.balance=Math.max(0,x.total-x.paid);
  saveDB(); closeSheet(); toast('Payment recorded'); render();
  if(x.cust.phone && confirm('Send payment confirmation on WhatsApp?')){
    openWA(x.cust.phone,'Received '+inr(amt)+' against '+x.no+'. '+(x.balance>0?'Balance now '+inr(x.balance)+'.':'Account cleared. Thank you!')+'\n— '+DB.shop.name);
  }
}
function deleteBill(id){
  if(!confirm('Delete this bill permanently?')) return;
  DB.invoices=DB.invoices.filter(function(i){return i.id!==id;});
  saveDB(); closeSheet(); toast('Deleted'); render();
}
/* ============================================================
   RATE LIST SHARING (WhatsApp)
============================================================ */
function shareRateList(scope,cat){
  var items=DB.items.slice();
  var title='RATE LIST';
  if(scope==='featured'){ items=items.filter(function(i){return i.feat||FEATURED_CATS.indexOf(i.cat)>=0;}); title='SPECIALITY RATE LIST'; }
  if(scope==='cat'){ items=items.filter(function(i){return i.cat===cat;}); title=cat.toUpperCase()+' RATE LIST'; }
  if(!items.length){toast('No items to share');return;}
  var groups={};
  items.forEach(function(i){ (groups[i.cat]=groups[i.cat]||[]).push(i); });
  var L=['*'+DB.shop.name.toUpperCase()+'*',DB.shop.addr,'📞 '+DB.shop.phone,'','*'+title+'*','('+todayStr()+')',''];
  Object.keys(groups).sort().forEach(function(c){
    L.push('*'+c+'*');
    groups[c].sort(function(a,b){return a.name.localeCompare(b.name);}).forEach(function(i){
      L.push('• '+i.name+' — '+inr(i.sell)+'/'+i.unit);
    });
    L.push('');
  });
  L.push('_Rates subject to change. Items not returnable after purchase._');
  L.push('— '+DB.shop.name);
  openWA('', L.join('\n'));

function saveTerms(){
  DB.terms=document.getElementById('s_terms').value.split('\n').map(function(s){return s.trim();}).filter(Boolean);
  if(!DB.terms.length) DB.terms=['Items will not be returned after purchase.'];
  saveDB(); toast('Terms saved');
}
function exportData(){
  DB.lastBackup=Date.now(); saveDB();
  var data=JSON.stringify(DB,null,2);
  var blob=new Blob([data],{type:'application/json'});
  var fn='AvonTraders-backup-'+new Date().toISOString().slice(0,10)+'.json';
  if(navigator.canShare){
    var file=new File([blob],fn,{type:'application/json'});
    if(navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:'Avon Traders backup'}).then(function(){toast('Backup shared');render();}).catch(function(){dlBlob(blob,fn);toast('Backup saved');render();});
      return;
    }
  }
  dlBlob(blob,fn); toast('Backup file saved'); render();
}
function importData(input){
  var f=input.files[0]; if(!f) return;
  var r=new FileReader();
  r.onload=function(){
    try{
      var d=JSON.parse(r.result);
      if(!d.items||!d.invoices) throw 0;
      if(!confirm('Restore this backup? It will replace current data.')) return;
      DB=d;
      for(var k in DEFAULTS){ if(!(k in DB)) DB[k]=JSON.parse(JSON.stringify(DEFAULTS[k])); }
      if(!DB.settings) DB.settings=JSON.parse(JSON.stringify(DEFAULTS.settings));
      saveDB(); toast('Backup restored'); go('home');
    }catch(e){ toast('Invalid backup file'); }
  };
  r.readAsText(f); input.value='';
}
function setBackupReminder(){
  toast('Tip: set a weekly alarm every Sunday to tap “Backup now” 🗓️');
}
function resetAll(){
  if(!confirm('This deletes ALL items, bills and settings on this device. Continue?')) return;
  if(!confirm('Are you sure? Take a backup first if needed.')) return;
  DB=JSON.parse(JSON.stringify(DEFAULTS)); DB.items=seedItems(); saveDB(); go('home'); toast('Reset done');
}

function screenHeader(title,sub){
  return '<div class="between" style="margin-bottom:10px">'+
    '<div><div class="section-eyebrow" style="margin:0">'+esc(title)+'</div>'+(sub?'<div class="muted" style="font-size:12px">'+esc(sub)+'</div>':'')+'</div>'+
    '<button class="btn ghost tiny" onclick="go(\'home\')">⌂ Home</button></div>';
}
function startOf(kind){
  var d=new Date(); d.setHours(0,0,0,0);
  if(kind==='day') return d.getTime();
  if(kind==='week'){ var wd=(d.getDay()+6)%7; d.setDate(d.getDate()-wd); return d.getTime(); } // Monday start
  if(kind==='month'){ d.setDate(1); return d.getTime(); }
  if(kind==='year'){ d.setMonth(0,1); return d.getTime(); }
  return 0;
}
function salesBetween(from,to){
  return DB.invoices.filter(function(x){ if(x.type!=='invoice') return false; var t=new Date(x.date).getTime(); return t>=from && (to==null||t<to); });
}
function expBetween(from,to){
  return (DB.expenses||[]).filter(function(e){ var t=new Date(e.date).getTime(); return t>=from && (to==null||t<to); });
}
function sum(arr,f){ return arr.reduce(function(a,b){return a+(f?f(b):b);},0); }

/* ============================================================
   REPORTS — day / week / month / year sales
============================================================ */
function viewReports(){
  var h=screenHeader('Sales Report','Day · Week · Month · Year');
  var periods=[['day','Today'],['week','This Week'],['month','This Month'],['year','This Year']];
  h+='<div class="rep-grid">';
  periods.forEach(function(p){
    var from=startOf(p[0]); var s=salesBetween(from,null); var tot=sum(s,function(x){return x.total;});
    var exp=sum(expBetween(from,null),function(e){return e.amount;});
    h+='<div class="rep-card"><div class="l">'+p[1]+'</div><div class="v tabular">'+inr(tot)+'</div>'+
       '<div class="c">'+s.length+' bill(s) · expenses '+inr(exp)+'</div></div>';
  });
  h+='</div>';

  /* collected vs due this month */
  var mFrom=startOf('month'); var mSales=salesBetween(mFrom,null);
  var collected=sum(mSales,function(x){return x.paid;}); var dueAdded=sum(mSales,function(x){return x.balance;});
  h+='<div class="section-eyebrow">This Month <span class="ln"></span></div>'+
     '<div class="card card-pad">'+
       '<div class="tot"><span>Collected (paid)</span><span class="tabular" style="color:var(--ok)">'+inr(collected)+'</span></div>'+
       '<div class="tot"><span>Still on credit</span><span class="tabular" style="color:var(--due)">'+inr(dueAdded)+'</span></div>'+
       '<div class="tot"><span>Expenses</span><span class="tabular">'+inr(sum(expBetween(mFrom,null),function(e){return e.amount;}))+'</span></div>'+
       '<div class="tot g" style="border-top:2px solid var(--steel);margin-top:6px;padding-top:8px"><span>Net (paid − expenses)</span><span class="tabular">'+inr(collected-sum(expBetween(mFrom,null),function(e){return e.amount;}))+'</span></div>'+
     '</div>';

  /* last 7 days bar */
  h+='<div class="section-eyebrow">Last 7 Days <span class="ln"></span></div><div class="card card-pad">';
  var days=[]; var max=1;
  for(var i=6;i>=0;i--){ var d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-i);
    var f=d.getTime(), t=f+86400000; var v=sum(salesBetween(f,t),function(x){return x.total;});
    days.push([d,v]); if(v>max)max=v; }
  days.forEach(function(dd){
    var lbl=dd[0].toLocaleDateString('en-IN',{weekday:'short'});
    h+='<div class="bar-row"><div class="bl">'+lbl+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(dd[1]/max*100)+'%"></div></div><div class="bv tabular">'+inr(dd[1])+'</div></div>';
  });
  h+='</div>';

  /* last 6 months bar */
  h+='<div class="section-eyebrow">Last 6 Months <span class="ln"></span></div><div class="card card-pad">';
  var mon=[]; var mmax=1; var base=new Date(); base.setDate(1); base.setHours(0,0,0,0);
  for(var j=5;j>=0;j--){ var ms=new Date(base.getFullYear(),base.getMonth()-j,1).getTime();
    var me=new Date(base.getFullYear(),base.getMonth()-j+1,1).getTime();
    var mv=sum(salesBetween(ms,me),function(x){return x.total;});
    mon.push([new Date(ms),mv]); if(mv>mmax)mmax=mv; }
  mon.forEach(function(mm){
    var lbl=mm[0].toLocaleDateString('en-IN',{month:'short'});
    h+='<div class="bar-row"><div class="bl">'+lbl+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(mm[1]/mmax*100)+'%"></div></div><div class="bv tabular">'+inr(mm[1])+'</div></div>';
  });
  h+='</div>';

  var allSales=DB.invoices.filter(function(x){return x.type==='invoice';});
  h+='<div class="card card-pad" style="margin-top:12px"><div class="tot"><span>All-time sales</span><span class="tabular" style="font-weight:800">'+inr(sum(allSales,function(x){return x.total;}))+'</span></div>'+
     '<div class="tot"><span>All-time bills</span><span class="tabular">'+allSales.length+'</span></div></div>';
  return h;
}

  if(r.deposit) h+='<div class="card card-pad" style="margin-top:10px"><div class="tot"><span>Deposit held</span><span class="tabular">'+inr(r.deposit)+'</span></div></div>';
  if(r.notes) h+='<div class="card card-pad" style="margin-top:10px"><div class="muted" style="font-size:12px">'+esc(r.notes)+'</div></div>';
  h+='<div class="spacer"></div>';
  if(!r.returned){
    h+='<button class="btn primary" onclick="markReturned(\''+r.id+'\')">✅ Mark Returned</button>';
    if(r.cust.phone) h+='<button class="btn wa" style="margin-top:8px" onclick="remindRental(\''+r.id+'\')">📲 Send Reminder</button>';
  }
  h+='<button class="btn danger" style="margin-top:8px" onclick="deleteRental(\''+r.id+'\')">Delete</button>';
  openSheet(h);
}
function markReturned(id){
  var r=DB.rentals.find(function(x){return x.id===id;}); if(!r) return;
  if(!confirm('Mark this rental as returned?')) return;
  r.returned=true; r.returnedDate=nowISO(); saveDB(); closeSheet(); toast('Marked returned'); render();
}
function remindRental(id){
  var r=DB.rentals.find(function(x){return x.id===id;}); if(!r) return;
  var lg=(DB.settings&&DB.settings.reminderLang)||'en';
  var items=r.items.map(function(it){return it.qty+' '+it.unit+' '+it.name;}).join(', ');
  var msg;
  if(lg==='hi') msg='नमस्ते '+r.cust.name+' 🙏\n*'+DB.shop.name+'* से याद-दिलावनी।\nकिराये पर लिया सामान: '+items+'\nकृपया '+(r.dueDate?fmtDate(r.dueDate)+' तक ':'')+'वापस कर दें। धन्यवाद!\n📞 '+DB.shop.phone;
  else if(lg==='ur') msg='السلام علیکم '+r.cust.name+' 🙏\n*'+DB.shop.name+'* کی طرف سے یاد دہانی۔\nکرائے پر لیا سامان: '+items+'\nبراہِ کرم '+(r.dueDate?fmtDate(r.dueDate)+' تک ':'')+'واپس کر دیں۔ شکریہ!\n📞 '+DB.shop.phone;
  else msg='Namaste '+r.cust.name+' 🙏\nReminder from *'+DB.shop.name+'*.\nRented items: '+items+'\nKindly return '+(r.dueDate?'by '+fmtDate(r.dueDate):'at your earliest')+'. Thank you!\n📞 '+DB.shop.phone;
  openWA(r.cust.phone, msg);
}
function deleteRental(id){ if(!confirm('Delete this rental record?'))return; DB.rentals=DB.rentals.filter(function(x){return x.id!==id;}); saveDB(); closeSheet(); toast('Deleted'); render(); }

/* ============================================================
   EXPENSES — conveyance, transport, tea, etc.
============================================================ */
function viewExpenses(){
  var h=screenHeader('Expenses','Conveyance, transport, tea & more');
  var today=sum(expBetween(startOf('day'),null),function(e){return e.amount;});
  var month=sum(expBetween(startOf('month'),null),function(e){return e.amount;});
  h+='<div class="tiles"><div class="tile amber"><div class="lbl">Today</div><div class="val tabular">'+inr(today)+'</div></div>'+
     '<div class="tile"><div class="lbl">This Month</div><div class="val tabular">'+inr(month)+'</div></div></div>';
  h+='<button class="btn primary" style="margin:12px 0" onclick="openExpenseForm()">➕ Add Expense</button>';
  var list=(DB.expenses||[]).slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  if(!list.length) return h+'<div class="empty"><div class="big">🧾</div><p>No expenses logged.</p></div>';
  /* group by date */
  var groups={};
  list.forEach(function(e){ var k=fmtDate(e.date); (groups[k]=groups[k]||[]).push(e); });
  Object.keys(groups).forEach(function(k){
    var dayTot=sum(groups[k],function(e){return e.amount;});
    h+='<div class="section-eyebrow">'+k+' · '+inr(dayTot)+' <span class="ln"></span></div><div class="card">';
    groups[k].forEach(function(e){
      h+='<div class="list-item"><div class="li-main"><div class="t">'+esc(e.cat)+'</div>'+(e.note?'<div class="s"><span>'+esc(e.note)+'</span></div>':'')+'</div>'+
         '<div class="li-right"><div class="p tabular">'+inr(e.amount)+'</div>'+
         '<button class="btn ghost tiny" style="margin-top:4px;color:var(--due)" onclick="deleteExpense(\''+e.id+'\')">Delete</button></div></div>';
    });
    h+='</div>';
  });
  return h;
}
function openExpenseForm(){
  var h='<h2>Add Expense<button class="x" onclick="closeSheet()">×</button></h2>';
  h+='<label class="fld"><span class="lab">Category</span><select class="inp" id="e_cat">'+EXP_CATS.map(function(c){return '<option>'+c+'</option>';}).join('')+'</select></label>';
  h+='<label class="fld"><span class="lab">Amount (₹)</span><input class="inp" id="e_amt" inputmode="decimal" placeholder="0"></label>';
  h+='<label class="fld"><span class="lab">Date</span><input class="inp" id="e_date" type="date" value="'+new Date().toISOString().slice(0,10)+'"></label>';
  h+='<label class="fld"><span class="lab">Note (optional)</span><input class="inp" id="e_note" placeholder="Details"></label>';
  h+='<button class="btn primary" onclick="saveExpense()">Save Expense</button>';
  openSheet(h);
}
function saveExpense(){
  var amt=parseFloat(document.getElementById('e_amt').value)||0;
  if(amt<=0){ toast('Enter amount'); return; }
  var dv=document.getElementById('e_date').value;
  DB.expenses.unshift({ id:'e'+Date.now(), cat:document.getElementById('e_cat').value,
    amount:amt, date:dv?new Date(dv).toISOString():nowISO(), note:document.getElementById('e_note').value.trim() });
  saveDB(); closeSheet(); toast('Expense added'); render();
}
function deleteExpense(id){ if(!confirm('Delete this expense?'))return; DB.expenses=DB.expenses.filter(function(e){return e.id!==id;}); saveDB(); toast('Deleted'); render(); }

/* ============================================================
   SUPPLIERS — purchase log + payments to supplier
============================================================ */
function viewSuppliers(){
  var h=screenHeader('Purchases','Supplier purchase log');
  var purch=DB.purchases||[];
  var owed=sum(purch,function(p){return Number(p.balance)||0;});
  var spent=sum(purch,function(p){return Number(p.amount)||0;});
  h+='<div class="tiles"><div class="tile '+(owed>0?'red':'green')+'"><div class="lbl">Payable to Suppliers</div><div class="val tabular">'+inr(owed)+'</div></div>'+
     '<div class="tile amber"><div class="lbl">Total Purchased</div><div class="val tabular">'+inr(spent)+'</div></div></div>';
  h+='<button class="btn primary" style="margin:12px 0" onclick="openPurchaseForm()">➕ Log Purchase</button>';
  if(!purch.length) return h+'<div class="empty"><div class="big">🚚</div><p>No purchases logged.</p><p class="muted">Record stock you buy from suppliers here.</p></div>';
  /* supplier-wise payable */
  var bySup={};
  purch.forEach(function(p){ var k=(p.supplier||'—'); if(!bySup[k])bySup[k]={name:k,phone:p.phone||'',bal:0}; bySup[k].bal+=Number(p.balance)||0; if(p.phone)bySup[k].phone=p.phone; });
  var owing=Object.keys(bySup).map(function(k){return bySup[k];}).filter(function(s){return s.bal>0;}).sort(function(a,b){return b.bal-a.bal;});
  if(owing.length){
    h+='<div class="section-eyebrow">Payable by Supplier <span class="ln"></span></div><div class="card">';
    owing.forEach(function(s){
      h+='<div class="rate-row"><div class="nm">'+esc(s.name)+(s.phone?'<small>'+esc(s.phone)+'</small>':'')+'</div>'+
         '<div class="price"><span class="badge due">'+inr(s.bal)+'</span></div></div>';
    });
    h+='</div>';
  }
  h+='<div class="section-eyebrow">Purchase History <span class="ln"></span></div><div class="card">';
  purch.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);}).forEach(function(p){
    var st=p.balance>0?'<span class="badge due">DUE '+inr(p.balance)+'</span>':'<span class="badge paid">PAID</span>';
    h+='<div class="list-item" onclick="openPurchaseView(\''+p.id+'\')"><div class="li-main"><div class="t">'+esc(p.supplier||'Supplier')+' '+st+'</div>'+
       '<div class="s"><span>'+p.no+'</span><span>'+fmtDate(p.date)+'</span>'+(p.desc?'<span>'+esc(p.desc).slice(0,24)+'</span>':'')+'</div></div>'+
       '<div class="li-right"><div class="p tabular">'+inr(p.amount)+'</div></div></div>';
  });
  h+='</div>';
  return h;
}
function openPurchaseForm(){
  var h='<h2>Log Purchase<button class="x" onclick="closeSheet()">×</button></h2>';
  h+='<label class="fld"><span class="lab">Supplier name</span><input class="inp" id="p_sup" placeholder="Supplier / firm"></label>';
  h+='<label class="fld"><span class="lab">Supplier phone (optional)</span><input class="inp" id="p_phone" inputmode="tel"></label>';
  h+='<label class="fld"><span class="lab">Items / description</span><textarea class="inp" id="p_desc" placeholder="What you bought"></textarea></label>';
  h+='<div class="grid2"><label class="fld"><span class="lab">Total amount (₹)</span><input class="inp" id="p_amt" inputmode="decimal" oninput="syncPurBal()"></label>'+
     '<label class="fld"><span class="lab">Paid now (₹)</span><input class="inp" id="p_paid" inputmode="decimal" oninput="syncPurBal()"></label></div>';
  h+='<div id="p_balhint" class="muted" style="font-size:12px;margin:-4px 2px 12px"></div>';
  h+='<label class="fld"><span class="lab">Date</span><input class="inp" id="p_date" type="date" value="'+new Date().toISOString().slice(0,10)+'"></label>';
  h+='<button class="btn primary" onclick="savePurchase()">Save Purchase</button>';
  openSheet(h);
}
function syncPurBal(){
  var a=parseFloat(document.getElementById('p_amt').value)||0;
  var p=parseFloat(document.getElementById('p_paid').value)||0;
  document.getElementById('p_balhint').innerHTML='Balance payable: <b style="color:var(--due)">'+inr(Math.max(0,a-p))+'</b>';
}
function savePurchase(){
  var sup=document.getElementById('p_sup').value.trim(); if(!sup){toast('Enter supplier');return;}
  var amt=parseFloat(document.getElementById('p_amt').value)||0;
  var paid=parseFloat(document.getElementById('p_paid').value)||0;
  var dv=document.getElementById('p_date').value;
  var no='AVT-PUR-'+String(DB.purSeq||1).padStart(4,'0'); DB.purSeq=(DB.purSeq||1)+1;
  DB.purchases.unshift({ id:'p'+Date.now(), no:no, supplier:sup, phone:document.getElementById('p_phone').value.trim(),
    desc:document.getElementById('p_desc').value.trim(), amount:amt, paid:Math.min(amt,paid), balance:Math.max(0,amt-paid),
    date:dv?new Date(dv).toISOString():nowISO() });
  saveDB(); closeSheet(); toast(no+' saved'); render();
}
function openPurchaseView(id){
  var p=DB.purchases.find(function(x){return x.id===id;}); if(!p) return;
  var h='<h2>'+p.no+'<button class="x" onclick="closeSheet()">×</button></h2>';
  h+='<div class="card card-pad"><div class="t" style="font-weight:800;font-size:16px">'+esc(p.supplier)+'</div>'+
     (p.phone?'<div class="muted">📞 '+esc(p.phone)+'</div>':'')+
     '<div class="muted" style="font-size:12px;margin-top:3px">'+fmtDate(p.date)+'</div>'+
     (p.desc?'<div style="margin-top:8px;font-size:13px">'+esc(p.desc)+'</div>':'')+'</div>';
  h+='<div class="card card-pad" style="margin-top:10px">'+
     '<div class="tot"><span>Total</span><span class="tabular">'+inr(p.amount)+'</span></div>'+
     '<div class="tot"><span>Paid</span><span class="tabular" style="color:var(--ok)">'+inr(p.paid)+'</span></div>'+
     '<div class="tot g" style="border-top:2px solid var(--steel);margin-top:6px;padding-top:8px;color:'+(p.balance>0?'var(--due)':'var(--ok)')+'"><span>Balance</span><span class="tabular">'+inr(p.balance)+'</span></div></div>';
  h+='<div class="spacer"></div>';
  if(p.balance>0) h+='<button class="btn primary" onclick="payPurchase(\''+p.id+'\')">💰 Record Payment to Supplier</button>';
  h+='<button class="btn danger" style="margin-top:8px" onclick="deletePurchase(\''+p.id+'\')">Delete</button>';
  openSheet(h);
}
function payPurchase(id){
  var p=DB.purchases.find(function(x){return x.id===id;}); if(!p) return;
  var h='<h2>Pay Supplier<button class="x" onclick="openPurchaseView(\''+id+'\')">×</button></h2>'+
    '<div class="card card-pad center"><div class="muted">'+esc(p.supplier)+' · '+p.no+'</div>'+
    '<div style="font-size:24px;font-weight:800;color:var(--due)" class="tabular">'+inr(p.balance)+'</div><div class="muted">payable</div></div>'+
    '<label class="fld" style="margin-top:12px"><span class="lab">Amount paid (₹)</span><input class="inp" id="pp_amt" inputmode="decimal"></label>'+
    '<div class="btn-row"><button class="btn ghost sm" onclick="document.getElementById(\'pp_amt\').value='+p.balance+'">Full '+inr(p.balance)+'</button></div>'+
    '<button class="btn primary" style="margin-top:10px" onclick="applyPurchasePay(\''+id+'\')">Save</button>';
  openSheet(h);
}
function applyPurchasePay(id){
  var p=DB.purchases.find(function(x){return x.id===id;});
  var amt=parseFloat(document.getElementById('pp_amt').value)||0;
  if(amt<=0){toast('Enter amount');return;}
  p.paid=Math.min(p.amount,(p.paid||0)+amt); p.balance=Math.max(0,p.amount-p.paid);
  saveDB(); closeSheet(); toast('Payment recorded'); render();
}
function deletePurchase(id){ if(!confirm('Delete this purchase?'))return; DB.purchases=DB.purchases.filter(function(x){return x.id!==id;}); saveDB(); closeSheet(); toast('Deleted'); render(); }

/* ============================================================
   APP LOCK (PIN)
============================================================ */
function pinHash(s){ var h=5381; s=String(s); for(var i=0;i<s.length;i++){ h=((h<<5)+h)+s.charCodeAt(i); h=h&0xffffffff; } return 'h'+(h>>>0); }
var _pinEntry='', _pinMode='unlock', _pinTemp='';
function lockApp(){
  if(!(DB.settings&&DB.settings.pin)) return;
  _pinMode='unlock'; _pinEntry=''; _pinTemp='';
  document.getElementById('lockTitle').textContent='Enter PIN';
  document.getElementById('lockmsg').textContent='';
  buildKeypad(); renderPinDots();
  document.getElementById('lockscreen').classList.add('show');
}
function startSetPin(){
  _pinMode='set'; _pinEntry=''; _pinTemp='';
  document.getElementById('lockTitle').textContent='Set a 4-digit PIN';
  document.getElementById('lockmsg').textContent='';
  buildKeypad(); renderPinDots();
  document.getElementById('lockscreen').classList.add('show');
}
function buildKeypad(){
  var kp=document.getElementById('keypad'); var b='';
  ['1','2','3','4','5','6','7','8','9'].forEach(function(n){ b+='<button onclick="pinPress(\''+n+'\')">'+n+'</button>'; });
  b+='<button class="fn" onclick="pinClear()">Clear</button>';
  b+='<button onclick="pinPress(\'0\')">0</button>';
  b+='<button class="fn" onclick="pinBack()">⌫</button>';
  kp.innerHTML=b;
}
function renderPinDots(){
  var d=''; for(var i=0;i<4;i++){ d+='<div class="d'+(i<_pinEntry.length?' on':'')+'"></div>'; }
  document.getElementById('pindots').innerHTML=d;
}
function pinPress(n){
  if(_pinEntry.length>=4) return;
  _pinEntry+=n; renderPinDots();
  if(_pinEntry.length===4) setTimeout(pinSubmit,120);
}
function pinBack(){ _pinEntry=_pinEntry.slice(0,-1); renderPinDots(); }
function pinClear(){ _pinEntry=''; renderPinDots(); }
function pinSubmit(){
  var msg=document.getElementById('lockmsg');
  if(_pinMode==='unlock'){
    if(pinHash(_pinEntry)===DB.settings.pin){ document.getElementById('lockscreen').classList.remove('show'); _pinEntry=''; }
    else { msg.textContent='Wrong PIN, try again'; _pinEntry=''; renderPinDots(); navigator.vibrate&&navigator.vibrate(80); }
  }else if(_pinMode==='set'){
    if(!_pinTemp){ _pinTemp=_pinEntry; _pinEntry=''; document.getElementById('lockTitle').textContent='Re-enter PIN'; renderPinDots(); }
    else {
      if(_pinTemp===_pinEntry){ DB.settings.pin=pinHash(_pinEntry); saveDB(); document.getElementById('lockscreen').classList.remove('show'); toast('App lock enabled'); if(TAB==='more')render(); }
      else { msg.textContent='PINs did not match, start again'; _pinTemp=''; _pinEntry=''; document.getElementById('lockTitle').textContent='Set a 4-digit PIN'; renderPinDots(); }
    }
  }
}
function removePin(){
  if(!confirm('Remove app lock PIN?')) return;
  DB.settings.pin=''; saveDB(); toast('App lock removed'); render();
}
function toggleLock(){
  if(DB.settings&&DB.settings.pin){ removePin(); }
  else { startSetPin(); }
}

/* ============================================================
   INSTALL + INIT
============================================================ */
var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){ e.preventDefault(); deferredPrompt=e;
  var b=document.getElementById('installBtn'); if(b){b.style.display='block';var hn=document.getElementById('installHint');if(hn)hn.style.display='none';}
});
function promptInstall(){ if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt=null; } else toast('Use Chrome menu → Add to Home screen'); }

if('serviceWorker' in navigator){
  window.addEventListener('load',function(){ navigator.serviceWorker.register('service-worker.js').catch(function(){}); });
}

/* re-lock when app returns to foreground after being hidden a while */
var _hideAt=0;
document.addEventListener('visibilitychange',function(){
  if(document.hidden){ _hideAt=Date.now(); }
  else if(_hideAt && Date.now()-_hideAt>60000){ lockApp(); }
});

loadDB();
go('home');
lockApp();
