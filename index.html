<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
<meta name="theme-color" content="#1C2028">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Avon Traders">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Avon Traders</title>
<style>
:root{
  --concrete:#EDEAE3;      /* warm light bg */
  --paper:#FFFFFF;
  --ink:#1B1A17;           /* near black warm */
  --steel:#2A303B;         /* structural dark */
  --steel-2:#3A4250;
  --galv:#6B7785;          /* muted steel */
  --line:#D8D2C7;          /* hairline */
  --ochre:#D4791B;         /* safety amber - primary */
  --ochre-deep:#B5640F;
  --wa:#1FA855;            /* whatsapp green */
  --wa-deep:#178A45;
  --due:#C0392B;           /* balance due red */
  --ok:#2E7D46;
  --shadow:0 1px 0 rgba(0,0,0,.04), 0 8px 24px -16px rgba(27,26,23,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans",sans-serif;
  background:var(--steel);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  font-size:16px;line-height:1.4;
}
#app{
  max-width:560px;margin:0 auto;min-height:100vh;background:var(--concrete);
  position:relative;display:flex;flex-direction:column;
  box-shadow:0 0 60px rgba(0,0,0,.35);
}
.tabular{font-variant-numeric:tabular-nums;}
.mono{font-feature-settings:"tnum";font-variant-numeric:tabular-nums;}

/* ---------- top bar ---------- */
.topbar{
  background:var(--steel);color:#fff;padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
  position:sticky;top:0;z-index:30;border-bottom:3px solid var(--ochre);
}
.topbar .brand{display:flex;align-items:center;gap:11px;}
.hexmark{width:34px;height:34px;flex:0 0 34px;}
.brand-txt h1{
  font-size:18px;margin:0;font-weight:800;letter-spacing:.14em;text-transform:uppercase;line-height:1;
}
.brand-txt p{margin:2px 0 0;font-size:10.5px;color:#aeb6c2;letter-spacing:.06em;text-transform:uppercase;}
.topbar .meta{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:8px;}
.chip{
  font-size:11px;letter-spacing:.04em;background:rgba(255,255,255,.08);color:#cfd6df;
  padding:5px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;
}
.chip.amber{background:rgba(212,121,27,.16);color:#f0b070;}
.chip b{color:#fff;font-weight:700;}

/* ---------- content ---------- */
main{flex:1;padding:14px 14px 96px;}
.section-eyebrow{
  font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--galv);
  font-weight:700;margin:18px 2px 8px;display:flex;align-items:center;gap:8px;
}
.section-eyebrow:first-child{margin-top:2px;}
.section-eyebrow .ln{flex:1;height:1px;background:var(--line);}

.card{
  background:var(--paper);border:1px solid var(--line);border-radius:12px;
  box-shadow:var(--shadow);overflow:hidden;
}
.card + .card{margin-top:10px;}
.card-pad{padding:14px;}

/* quick search */
.searchwrap{position:relative;margin-bottom:4px;}
.searchwrap input{
  width:100%;border:1.5px solid var(--line);background:var(--paper);border-radius:12px;
  padding:14px 14px 14px 44px;font-size:16px;font-weight:600;color:var(--ink);box-shadow:var(--shadow);
}
.searchwrap input:focus{outline:none;border-color:var(--ochre);}
.searchwrap .ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--galv);font-size:18px;}
.searchwrap .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--galv);font-size:22px;padding:6px 10px;cursor:pointer;}

/* result rows */
.rate-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);}
.rate-row:last-child{border-bottom:none;}
.rate-row .nm{font-weight:700;flex:1;min-width:0;}
.rate-row .nm small{display:block;font-weight:500;color:var(--galv);font-size:11.5px;letter-spacing:.03em;text-transform:uppercase;margin-top:2px;}
.rate-row .price{font-weight:800;font-size:17px;white-space:nowrap;}
.rate-row .price small{font-weight:600;color:var(--galv);font-size:11px;}
.rate-row.low{background:#fdf3ef;}

.badge{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:3px 7px;border-radius:5px;display:inline-block;}
.badge.feat{background:var(--ochre);color:#fff;}
.badge.low{background:#fbe3dc;color:var(--due);}
.badge.out{background:var(--due);color:#fff;}
.badge.due{background:#fbe3dc;color:var(--due);}
.badge.paid{background:#e0f0e5;color:var(--ok);}
.badge.partial{background:#fdeede;color:var(--ochre-deep);}
.badge.cat{background:#eef0f3;color:var(--steel-2);}

/* buttons */
.btn{
  appearance:none;border:none;border-radius:11px;font-weight:800;letter-spacing:.02em;
  padding:14px 16px;font-size:15px;cursor:pointer;display:inline-flex;align-items:center;
  justify-content:center;gap:8px;width:100%;transition:transform .04s ease, filter .15s;
}
.btn:active{transform:scale(.985);}
.btn.primary{background:var(--ochre);color:#fff;}
.btn.steel{background:var(--steel);color:#fff;}
.btn.wa{background:var(--wa);color:#fff;}
.btn.ghost{background:transparent;color:var(--steel-2);border:1.5px solid var(--line);}
.btn.danger{background:#fff;color:var(--due);border:1.5px solid #eccfca;}
.btn.sm{padding:10px 12px;font-size:13px;border-radius:9px;width:auto;}
.btn.tiny{padding:7px 10px;font-size:12px;border-radius:8px;width:auto;gap:5px;}
.btn-row{display:flex;gap:8px;}
.btn-row .btn{flex:1;}

/* stat tiles */
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tile{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:13px 14px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.tile::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--galv);}
.tile.amber::before{background:var(--ochre);}
.tile.red::before{background:var(--due);}
.tile.green::before{background:var(--ok);}
.tile .lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--galv);font-weight:700;}
.tile .val{font-size:23px;font-weight:800;margin-top:3px;}
.tile .val small{font-size:13px;font-weight:600;color:var(--galv);}

/* featured / promo */
.promo{
  background:linear-gradient(135deg,var(--steel) 0%, #1d2733 100%);color:#fff;border-radius:14px;
  padding:16px;position:relative;overflow:hidden;border:1px solid #0e141b;
}
.promo::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;
  background:radial-gradient(circle, rgba(212,121,27,.32), transparent 70%);}
.promo .tag{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ochre);font-weight:800;}
.promo h3{margin:6px 0 4px;font-size:19px;letter-spacing:.02em;}
.promo p{margin:0;font-size:13px;color:#c4ccd6;}
.promo .pills{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px;}
.promo .pp{font-size:11.5px;font-weight:700;background:rgba(255,255,255,.1);padding:6px 10px;border-radius:8px;}

/* lists / items */
.list-item{display:flex;gap:12px;align-items:center;padding:13px 14px;border-bottom:1px solid var(--line);}
.list-item:last-child{border-bottom:none;}
.li-main{flex:1;min-width:0;}
.li-main .t{font-weight:700;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.li-main .s{font-size:12px;color:var(--galv);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;}
.li-right{text-align:right;white-space:nowrap;}
.li-right .p{font-weight:800;font-size:16px;}
.li-right .m{font-size:11px;color:var(--ok);font-weight:700;}

/* forms */
label.fld{display:block;margin-bottom:12px;}
label.fld .lab{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--steel-2);margin-bottom:5px;display:block;}
.inp,select.inp,textarea.inp{
  width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px;font-size:16px;
  font-family:inherit;color:var(--ink);background:var(--paper);
}
.inp:focus{outline:none;border-color:var(--ochre);}
textarea.inp{resize:vertical;min-height:64px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.switch{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 0;border-top:1px solid var(--line);}
.switch .lab{font-weight:700;font-size:14px;}
.switch .sub{font-size:12px;color:var(--galv);font-weight:500;margin-top:2px;}
.toggle{width:48px;height:28px;border-radius:999px;background:#cfcabf;position:relative;flex:0 0 48px;cursor:pointer;transition:background .15s;}
.toggle.on{background:var(--ochre);}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
.toggle.on::after{left:23px;}

/* bottom sheet / modal */
.sheet-bg{position:fixed;inset:0;background:rgba(20,22,28,.55);z-index:50;display:none;align-items:flex-end;justify-content:center;}
.sheet-bg.show{display:flex;}
.sheet{
  background:var(--concrete);width:100%;max-width:560px;border-radius:18px 18px 0 0;
  max-height:92vh;overflow-y:auto;padding:8px 14px calc(env(safe-area-inset-bottom) + 18px);
  animation:up .22s ease;
}
@keyframes up{from{transform:translateY(40px);opacity:.6;}to{transform:translateY(0);opacity:1;}}
.sheet-grab{width:40px;height:4px;border-radius:3px;background:#cabfb0;margin:8px auto 4px;}
.sheet h2{font-size:18px;margin:6px 2px 14px;letter-spacing:.02em;display:flex;align-items:center;justify-content:space-between;}
.sheet h2 .x{background:none;border:none;font-size:26px;color:var(--galv);cursor:pointer;line-height:1;padding:0 4px;}

/* line items in bill */
.lineitem{display:flex;gap:8px;align-items:center;padding:10px 0;border-bottom:1px dashed var(--line);}
.lineitem .nm{flex:1;min-width:0;font-weight:700;font-size:14px;}
.lineitem .nm small{display:block;color:var(--galv);font-weight:500;font-size:11.5px;}
.qtybox{display:flex;align-items:center;border:1.5px solid var(--line);border-radius:9px;overflow:hidden;}
.qtybox button{width:32px;height:36px;border:none;background:#f1ede5;font-size:18px;font-weight:800;color:var(--steel-2);cursor:pointer;}
.qtybox input{width:42px;border:none;text-align:center;font-weight:800;font-size:15px;padding:0;}
.lineitem .amt{font-weight:800;width:74px;text-align:right;font-size:14px;}
.lineitem .rm{background:none;border:none;color:var(--due);font-size:18px;padding:4px 2px;cursor:pointer;}

/* invoice preview */
.doc{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;font-size:13px;color:#222;box-shadow:var(--shadow);}
.doc .dh{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--steel);padding-bottom:10px;}
.doc .dh h3{margin:0;font-size:18px;letter-spacing:.1em;text-transform:uppercase;}
.doc .dh p{margin:2px 0 0;font-size:11px;color:#666;}
.doc table{width:100%;border-collapse:collapse;margin-top:10px;}
.doc th{text-align:left;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:#888;border-bottom:1px solid #ddd;padding:6px 4px;}
.doc td{padding:7px 4px;border-bottom:1px solid #eee;font-size:12.5px;vertical-align:top;}
.doc td.r,.doc th.r{text-align:right;}
.doc .tot{display:flex;justify-content:space-between;padding:3px 0;font-size:13px;}
.doc .tot.g{font-weight:800;font-size:16px;border-top:2px solid var(--steel);margin-top:6px;padding-top:8px;}
.doc .terms{margin-top:12px;font-size:10.5px;color:#777;border-top:1px dashed #ccc;padding-top:8px;}
.doc .terms b{color:#444;display:block;margin-bottom:3px;letter-spacing:.05em;text-transform:uppercase;font-size:10px;}

/* empty state */
.empty{text-align:center;padding:36px 20px;color:var(--galv);}
.empty .big{font-size:34px;margin-bottom:8px;}
.empty p{margin:4px 0;font-size:14px;}

/* banner */
.banner{display:flex;gap:10px;align-items:center;background:#fdf3e7;border:1px solid #f0d9b8;border-radius:11px;padding:11px 13px;margin-bottom:10px;}
.banner .bi{font-size:20px;}
.banner .bt{flex:1;font-size:13px;font-weight:600;color:#8a5a13;}
.banner.green{background:#eaf5ee;border-color:#bfe0cb;}
.banner.green .bt{color:#1f6b3a;}

/* bottom nav */
.bottomnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;
  background:var(--steel);display:flex;z-index:40;border-top:1px solid #0e141b;
  padding-bottom:env(safe-area-inset-bottom);
}
.navbtn{flex:1;background:none;border:none;color:#8b95a3;padding:9px 4px 8px;font-size:10.5px;font-weight:700;
  letter-spacing:.03em;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;}
.navbtn .ni{font-size:20px;line-height:1;}
.navbtn.active{color:var(--ochre);}
.navbtn.fab{color:#fff;}
.navbtn.fab .ni{background:var(--ochre);width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:-14px;box-shadow:0 6px 14px -4px rgba(212,121,27,.7);font-size:24px;}

/* toast */
#toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;
  padding:12px 18px;border-radius:10px;font-size:13.5px;font-weight:600;opacity:0;transition:.25s;z-index:60;pointer-events:none;max-width:90%;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.muted{color:var(--galv);}
.right{text-align:right;}
.hr{height:1px;background:var(--line);margin:14px 0;}
.spacer{height:8px;}
.center{text-align:center;}
.flex{display:flex;align-items:center;gap:8px;}
.between{display:flex;align-items:center;justify-content:space-between;gap:8px;}
a.link{color:var(--ochre-deep);font-weight:700;text-decoration:none;}

@media print{
  body{background:#fff;}
  #app{box-shadow:none;}
  .topbar,.bottomnav,#toast,.no-print{display:none !important;}
  main{padding:0;}
}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <svg class="hexmark" viewBox="0 0 100 100" aria-hidden="true">
        <polygon points="50,6 88,28 88,72 50,94 12,72 12,28" fill="#D4791B"/>
        <polygon points="50,24 72,37 72,63 50,76 28,63 28,37" fill="#2A303B"/>
        <circle cx="50" cy="50" r="13" fill="#D4791B"/><circle cx="50" cy="50" r="6.5" fill="#2A303B"/>
      </svg>
      <div class="brand-txt">
        <h1>Avon Traders</h1>
        <p>Balaganj &middot; Lucknow</p>
      </div>
    </div>
    <div class="meta">
      <span class="chip amber">📞 <b>93695&nbsp;53111</b></span>
      <span class="chip" id="netchip">●&nbsp;Saved on phone</span>
    </div>
  </header>
  <main id="view"><!-- rendered --></main>
  <nav class="bottomnav">
    <button class="navbtn" data-tab="home"><span class="ni">⌂</span>Home</button>
    <button class="navbtn" data-tab="items"><span class="ni">▤</span>Items</button>
    <button class="navbtn fab" data-tab="bill"><span class="ni">+</span>Bill</button>
    <button class="navbtn" data-tab="khata"><span class="ni">₹</span>Khata</button>
    <button class="navbtn" data-tab="more"><span class="ni">≡</span>More</button>
  </nav>
</div>
<div class="sheet-bg" id="sheetbg"><div class="sheet" id="sheet"></div></div>
<div id="toast"></div>
<script>
/* ============================================================
   AVON TRADERS — data + utilities
   Data is stored locally on this device (localStorage).
   Use More > Backup to save a copy to Files/Drive.
============================================================ */
'use strict';

/* ---- storage with safe in-memory fallback (so preview never crashes) ---- */
var Store=(function(){
  var mem={}, ok=true;
  try{ var k='__t'; localStorage.setItem(k,'1'); localStorage.removeItem(k); }catch(e){ ok=false; }
  return {
    persistent:ok,
    get:function(k){ try{ return ok?localStorage.getItem(k):(mem[k]??null);}catch(e){return mem[k]??null;} },
    set:function(k,v){ try{ if(ok)localStorage.setItem(k,v); else mem[k]=v;}catch(e){mem[k]=v;} },
  };
})();

var DB_KEY='avon_traders_db_v1';

var DEFAULTS={
  shop:{
    name:'Avon Traders',
    addr:'Campbell Road, Balaganj, Lucknow',
    phone:'9369553111',
    gst:''
  },
  terms:[
    'Items will not be returned after purchase.',
    'Goods once sold cannot be exchanged.',
    'Rates are subject to change without notice.',
    'Payment due on delivery unless agreed otherwise.'
  ],
  invSeq:1,
  quoteSeq:1,
  lastBackup:0,
  items:[],
  customers:[],
  invoices:[]
};

var CATS=['Rope','Tassla','Taar (Wire)','Allen Bolt','GI Pipe','GI Fitting','Hardware','Other'];
var FEATURED_CATS=['Allen Bolt','GI Pipe','GI Fitting']; // the shop's USP
var UNITS=['piece','kg','metre','foot','bundle','dozen','box','set','coil'];

function seedItems(){
  var t=Date.now();
  function it(name,cat,unit,buy,sell,stock,min,feat){
    return {id:'i'+(t++),name:name,cat:cat,unit:unit,buy:buy,sell:sell,stock:stock,min:min,feat:!!feat};
  }
  return [
    it('Narial Rassi','Rope','kg',70,95,40,10,false),
    it('Plastic Tassla','Tassla','piece',55,80,30,8,false),
    it('Lohe ka Tassla','Tassla','piece',140,190,18,5,false),
    it('Kaccha Taar','Taar (Wire)','kg',60,82,55,15,false),
    it('Steel Taar','Taar (Wire)','kg',95,130,35,12,false),
    it('Aakudi','Hardware','piece',12,20,120,30,false),
    /* ---- USP featured stock (edit rates as needed) ---- */
    it('Allen Bolt M6 x 25','Allen Bolt','piece',3.5,6,500,100,true),
    it('Allen Bolt M8 x 40','Allen Bolt','piece',6,10,400,80,true),
    it('Allen Bolt M10 x 50','Allen Bolt','piece',9,15,250,60,true),
    it('GI Pipe 1/2 inch (B)','GI Pipe','foot',38,52,300,50,true),
    it('GI Pipe 3/4 inch (B)','GI Pipe','foot',52,70,220,40,true),
    it('GI Pipe 1 inch (B)','GI Pipe','foot',74,98,180,40,true),
    it('GI Elbow 1/2 inch','GI Fitting','piece',14,22,150,30,true),
    it('GI Tee 1/2 inch','GI Fitting','piece',18,28,120,30,true),
    it('GI Socket 1/2 inch','GI Fitting','piece',10,16,160,30,true),
    it('GI Union 1/2 inch','GI Fitting','piece',32,48,70,15,true)
  ];
}

var DB;
function loadDB(){
  var raw=Store.get(DB_KEY);
  if(raw){
    try{ DB=JSON.parse(raw); }catch(e){ DB=null; }
  }
  if(!DB){
    DB=JSON.parse(JSON.stringify(DEFAULTS));
    DB.items=seedItems();
    saveDB();
  }
  // backfill any missing keys
  for(var k in DEFAULTS){ if(!(k in DB)) DB[k]=JSON.parse(JSON.stringify(DEFAULTS[k])); }
}
function saveDB(){ Store.set(DB_KEY, JSON.stringify(DB)); }

/* ---------- helpers ---------- */
function inr(n){
  n=Number(n)||0;
  var neg=n<0; n=Math.abs(n);
  var s=n.toFixed(2).replace(/\.00$/,'');
  var parts=s.split('.'); var x=parts[0];
  var last3=x.slice(-3), rest=x.slice(0,-3);
  if(rest) last3=','+last3;
  rest=rest.replace(/\B(?=(\d{2})+(?!\d))/g,',');
  var out=rest+last3+(parts[1]?'.'+parts[1]:'');
  return (neg?'-':'')+'₹'+out;
}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function todayStr(){var d=new Date();return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function nowISO(){return new Date().toISOString();}
function daysSince(ts){ if(!ts) return 999; return Math.floor((Date.now()-ts)/86400000); }
function cleanPhone(p){ p=String(p||'').replace(/\D/g,''); if(p.length===10) p='91'+p; return p; }
function byId(id){return DB.items.find(function(x){return x.id===id;});}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm=setTimeout(function(){t.classList.remove('show');},2200);
}
function openWA(phone,text){
  var p=cleanPhone(phone);
  var url='https://wa.me/'+(p||'')+'?text='+encodeURIComponent(text);
  window.open(url,'_blank');
}

/* ---------- bottom sheet ---------- */
function openSheet(html){
  document.getElementById('sheet').innerHTML='<div class="sheet-grab"></div>'+html;
  document.getElementById('sheetbg').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeSheet(){
  document.getElementById('sheetbg').classList.remove('show');
  document.body.style.overflow='';
}
document.getElementById('sheetbg').addEventListener('click',function(e){ if(e.target.id==='sheetbg') closeSheet(); });
/* ============================================================
   NAVIGATION + ROUTER
============================================================ */
var TAB='home';
function go(tab){
  TAB=tab;
  if(tab==='bill'){ openBillBuilder(); return; }
  document.querySelectorAll('.navbtn').forEach(function(b){
    b.classList.toggle('active', b.dataset.tab===tab && tab!=='bill');
  });
  render();
}
document.querySelectorAll('.navbtn').forEach(function(b){
  b.addEventListener('click',function(){ go(b.dataset.tab); });
});

function render(){
  var v=document.getElementById('view');
  if(TAB==='home') v.innerHTML=viewHome();
  else if(TAB==='items') v.innerHTML=viewItems();
  else if(TAB==='khata') v.innerHTML=viewKhata();
  else if(TAB==='more') v.innerHTML=viewMore();
  window.scrollTo(0,0);
  if(TAB==='items') wireItemSearch();
  if(TAB==='home') wireQuickSearch();
}

/* ============================================================
   HOME — quick price search + dashboard
============================================================ */
function lowStockItems(){ return DB.items.filter(function(i){return i.stock<=i.min;}); }
function outstanding(){
  return DB.invoices.filter(function(x){return x.type==='invoice' && x.balance>0;});
}
function totalDue(){ return outstanding().reduce(function(a,b){return a+b.balance;},0); }
function pendingDeliveries(){ return DB.invoices.filter(function(x){return x.type==='invoice' && x.delivery && !x.delivered;}); }

function viewHome(){
  var low=lowStockItems(), out=outstanding();
  var due=totalDue();
  var bk=daysSince(DB.lastBackup);
  var h='';

  /* backup reminder */
  if(bk>=7){
    h+='<div class="banner"><span class="bi">🗄️</span><div class="bt">Weekly backup due — last backup '+
        (DB.lastBackup?bk+' days ago':'never')+'. Save a copy now.</div>'+
        '<button class="btn primary tiny" onclick="exportData()">Backup</button></div>';
  }

  /* quick price search */
  h+='<div class="searchwrap"><span class="ic">🔍</span>'+
     '<input id="qsearch" type="text" inputmode="search" autocomplete="off" placeholder="Quick price search — type item name…">'+
     '<button class="clr" id="qclr" style="display:none">×</button></div>'+
     '<div id="qresults"></div>';

  /* tiles */
  h+='<div class="tiles" style="margin-top:12px">'+
       '<div class="tile amber"><div class="lbl">Items</div><div class="val">'+DB.items.length+'</div></div>'+
       '<div class="tile '+(due>0?'red':'green')+'"><div class="lbl">Balance Due</div><div class="val tabular">'+inr(due)+'</div></div>'+
       '<div class="tile '+(low.length?'red':'green')+'"><div class="lbl">Low Stock</div><div class="val">'+low.length+'</div></div>'+
       '<div class="tile"><div class="lbl">Bills</div><div class="val">'+DB.invoices.filter(function(x){return x.type==="invoice";}).length+'</div></div>'+
     '</div>';

  /* featured promo — the USP */
  h+='<div class="section-eyebrow">Our Speciality <span class="ln"></span></div>'+
     '<div class="promo">'+
       '<div class="tag">⬡ Only at Avon Traders</div>'+
       '<h3>Allen Key Bolts · GI Pipe · GI Fittings</h3>'+
       '<p>Full range of sizes — wholesale & retail. Tap to share the rate list on WhatsApp.</p>'+
       '<div class="pills"><span class="pp">All Allen Bolt sizes</span><span class="pp">GI Pipe ½"–2"</span><span class="pp">Elbow · Tee · Socket · Union</span></div>'+
       '<div class="btn-row" style="margin-top:12px">'+
         '<button class="btn wa" onclick="shareRateList(\'featured\')">📤 Share Speciality Rates</button>'+
       '</div>'+
     '</div>';

  /* quick actions */
  h+='<div class="section-eyebrow">Quick Actions <span class="ln"></span></div>'+
     '<div class="grid2">'+
       '<button class="btn primary" onclick="openBillBuilder()">🧾 New Bill</button>'+
       '<button class="btn steel" onclick="openBillBuilder(true)">📄 New Quote</button>'+
       '<button class="btn ghost" onclick="shareRateList(\'all\')">📋 Full Rate List</button>'+
       '<button class="btn ghost" onclick="openItemForm()">➕ Add Item</button>'+
     '</div>';

  /* low stock list */
  if(low.length){
    h+='<div class="section-eyebrow">Reorder Soon <span class="ln"></span></div><div class="card">';
    low.slice(0,6).forEach(function(i){
      h+='<div class="rate-row low"><div class="nm">'+esc(i.name)+
         '<small>'+esc(i.cat)+'</small></div>'+
         '<div class="price"><span class="badge '+(i.stock<=0?'out':'low')+'">'+(i.stock<=0?'OUT':'LOW')+'</span> '+
         '<span class="tabular">'+i.stock+'</span> <small>'+esc(i.unit)+' left</small></div></div>';
    });
    h+='</div>';
  }

  /* deliveries */
  var del=pendingDeliveries();
  if(del.length){
    h+='<div class="section-eyebrow">Pending Home Deliveries <span class="ln"></span></div><div class="card">';
    del.slice(0,5).forEach(function(x){
      h+='<div class="list-item"><div class="li-main"><div class="t">'+esc(x.cust.name||'Customer')+
         ' <span class="badge cat">'+x.no+'</span></div>'+
         '<div class="s">📍 '+esc(x.delAddr||x.cust.addr||'—')+'</div></div>'+
         '<button class="btn primary tiny" onclick="markDelivered(\''+x.id+'\')">Done</button></div>';
    });
    h+='</div>';
  }
  return h;
}

function rateRowHTML(i){
  var badge = i.stock<=0?'<span class="badge out">OUT</span> '
            : i.stock<=i.min?'<span class="badge low">LOW</span> ':'';
  return '<div class="rate-row'+(i.stock<=i.min?' low':'')+'">'+
    '<div class="nm">'+esc(i.name)+(i.feat?' <span class="badge feat">★</span>':'')+
      '<small>'+esc(i.cat)+' · '+i.stock+' '+esc(i.unit)+' in stock</small></div>'+
    '<div class="price">'+badge+inr(i.sell)+' <small>/'+esc(i.unit)+'</small></div></div>';
}

function wireQuickSearch(){
  var inp=document.getElementById('qsearch'), res=document.getElementById('qresults'), clr=document.getElementById('qclr');
  if(!inp) return;
  function run(){
    var q=inp.value.trim().toLowerCase();
    clr.style.display=q?'block':'none';
    if(!q){ res.innerHTML=''; return; }
    var m=DB.items.filter(function(i){return (i.name+' '+i.cat).toLowerCase().indexOf(q)>=0;})
                  .sort(function(a,b){return a.name.localeCompare(b.name);}).slice(0,12);
    if(!m.length){ res.innerHTML='<div class="card card-pad muted center">No item matches “'+esc(q)+'”. <a class="link" onclick="openItemForm()">Add it?</a></div>'; return; }
    res.innerHTML='<div class="card" style="margin-top:8px">'+m.map(rateRowHTML).join('')+'</div>';
  }
  inp.addEventListener('input',run);
  clr.addEventListener('click',function(){inp.value='';run();inp.focus();});
}

function markDelivered(id){
  var x=DB.invoices.find(function(i){return i.id===id;});
  if(x){ x.delivered=true; saveDB(); toast('Marked delivered'); render(); }
}
/* ============================================================
   ITEMS — inventory, buy/sell rates, stock triggers, CRUD
============================================================ */
var itemFilter='all';
function viewItems(){
  var h='';
  h+='<div class="searchwrap"><span class="ic">🔍</span>'+
     '<input id="isearch" type="text" autocomplete="off" placeholder="Search items…">'+
     '<button class="clr" id="iclr" style="display:none">×</button></div>';

  /* category filter pills */
  h+='<div style="display:flex;gap:7px;overflow-x:auto;padding:10px 0 4px;-webkit-overflow-scrolling:touch">';
  h+=catPill('all','All');
  CATS.forEach(function(c){ h+=catPill(c,c); });
  h+='</div>';

  h+='<button class="btn primary" onclick="openItemForm()" style="margin:4px 0 10px">➕ Add New Item</button>';

  h+='<div id="ilist"></div>';
  // initial list rendered by wireItemSearch
  setTimeout(wireItemSearch,0);
  return h;
}
function catPill(val,label){
  var on=itemFilter===val;
  return '<button class="btn '+(on?'primary':'ghost')+' tiny" style="white-space:nowrap" onclick="itemFilter=\''+val.replace(/'/g,"\\'")+'\';render()">'+esc(label)+'</button>';
}

function itemListHTML(q){
  q=(q||'').trim().toLowerCase();
  var arr=DB.items.filter(function(i){
    if(itemFilter!=='all' && i.cat!==itemFilter) return false;
    if(q && (i.name+' '+i.cat).toLowerCase().indexOf(q)<0) return false;
    return true;
  }).sort(function(a,b){
    if((b.feat?1:0)!==(a.feat?1:0)) return (b.feat?1:0)-(a.feat?1:0);
    return a.name.localeCompare(b.name);
  });
  if(!arr.length) return '<div class="empty"><div class="big">📦</div><p>No items here.</p><p class="muted">Tap “Add New Item” to create one.</p></div>';
  var h='<div class="card">';
  arr.forEach(function(i){
    var margin = i.sell-i.buy;
    var mpct = i.buy>0 ? Math.round(margin/i.buy*100) : 0;
    h+='<div class="list-item" onclick="openItemForm(\''+i.id+'\')">'+
        '<div class="li-main"><div class="t">'+esc(i.name)+
          (i.feat?' <span class="badge feat">★ Special</span>':'')+
          (i.stock<=0?' <span class="badge out">OUT</span>':(i.stock<=i.min?' <span class="badge low">LOW</span>':''))+
        '</div>'+
        '<div class="s"><span class="badge cat">'+esc(i.cat)+'</span>'+
          '<span>Buy '+inr(i.buy)+'</span><span>Stock '+i.stock+' '+esc(i.unit)+'</span></div></div>'+
        '<div class="li-right"><div class="p tabular">'+inr(i.sell)+'</div>'+
          '<div class="m">'+(margin>=0?'+':'')+inr(margin)+' ('+mpct+'%)</div></div>'+
        '</div>';
  });
  h+='</div>';
  return h;
}

function wireItemSearch(){
  var list=document.getElementById('ilist'); if(!list) return;
  var inp=document.getElementById('isearch'), clr=document.getElementById('iclr');
  function run(){ list.innerHTML=itemListHTML(inp?inp.value:''); if(clr)clr.style.display=(inp&&inp.value)?'block':'none'; }
  if(inp) inp.addEventListener('input',run);
  if(clr) clr.addEventListener('click',function(){inp.value='';run();inp.focus();});
  run();
}

/* ---- add / edit item form ---- */
function openItemForm(id){
  var it = id ? byId(id) : {id:'',name:'',cat:'Hardware',unit:'piece',buy:'',sell:'',stock:'',min:'',feat:false};
  var isNew=!id;
  var h='<h2>'+(isNew?'Add Item':'Edit Item')+'<button class="x" onclick="closeSheet()">×</button></h2>';
  h+='<label class="fld"><span class="lab">Item name</span><input class="inp" id="f_name" value="'+esc(it.name)+'" placeholder="e.g. GI Pipe 1 inch"></label>';
  h+='<div class="grid2">'+
       '<label class="fld"><span class="lab">Category</span><select class="inp" id="f_cat">'+
         CATS.map(function(c){return '<option'+(c===it.cat?' selected':'')+'>'+c+'</option>';}).join('')+'</select></label>'+
       '<label class="fld"><span class="lab">Unit</span><select class="inp" id="f_unit">'+
         UNITS.map(function(u){return '<option'+(u===it.unit?' selected':'')+'>'+u+'</option>';}).join('')+'</select></label>'+
     '</div>';
  h+='<div class="grid2">'+
       '<label class="fld"><span class="lab">Buy rate (wholesale)</span><input class="inp" id="f_buy" inputmode="decimal" value="'+(it.buy===''?'':it.buy)+'" placeholder="₹"></label>'+
       '<label class="fld"><span class="lab">Sell rate</span><input class="inp" id="f_sell" inputmode="decimal" value="'+(it.sell===''?'':it.sell)+'" placeholder="₹"></label>'+
     '</div>';
  h+='<div id="marginhint" class="muted" style="font-size:12px;margin:-4px 2px 12px;"></div>';
  h+='<div class="grid2">'+
       '<label class="fld"><span class="lab">Stock qty</span><input class="inp" id="f_stock" inputmode="numeric" value="'+(it.stock===''?'':it.stock)+'" placeholder="0"></label>'+
       '<label class="fld"><span class="lab">Reorder at (min)</span><input class="inp" id="f_min" inputmode="numeric" value="'+(it.min===''?'':it.min)+'" placeholder="Low-stock alert"></label>'+
     '</div>';
  h+='<div class="switch" id="f_feat_w"><div><div class="lab">Mark as Speciality ★</div><div class="sub">Show in promo & speciality rate list</div></div>'+
       '<div class="toggle'+(it.feat?' on':'')+'" id="f_feat"></div></div>';
  h+='<div class="spacer"></div>';
  h+='<button class="btn primary" onclick="saveItem(\''+(it.id||'')+'\')">'+(isNew?'Add Item':'Save Changes')+'</button>';
  if(!isNew){
    h+='<div class="grid2" style="margin-top:10px">'+
        '<button class="btn ghost" onclick="adjustStock(\''+it.id+'\')">📦 Adjust Stock</button>'+
        '<button class="btn danger" onclick="deleteItem(\''+it.id+'\')">Delete</button></div>';
  }
  openSheet(h);
  var fe=document.getElementById('f_feat');
  fe.addEventListener('click',function(){fe.classList.toggle('on');});
  function mh(){
    var b=parseFloat(document.getElementById('f_buy').value)||0;
    var s=parseFloat(document.getElementById('f_sell').value)||0;
    var el=document.getElementById('marginhint');
    if(b&&s){ var m=s-b; el.innerHTML='Margin: <b style="color:var(--ok)">'+inr(m)+'</b> ('+(b>0?Math.round(m/b*100):0)+'%)'; }
    else el.textContent='';
  }
  document.getElementById('f_buy').addEventListener('input',mh);
  document.getElementById('f_sell').addEventListener('input',mh);
  mh();
}

function saveItem(id){
  var name=document.getElementById('f_name').value.trim();
  if(!name){ toast('Enter item name'); return; }
  var obj={
    name:name,
    cat:document.getElementById('f_cat').value,
    unit:document.getElementById('f_unit').value,
    buy:parseFloat(document.getElementById('f_buy').value)||0,
    sell:parseFloat(document.getElementById('f_sell').value)||0,
    stock:parseInt(document.getElementById('f_stock').value)||0,
    min:parseInt(document.getElementById('f_min').value)||0,
    feat:document.getElementById('f_feat').classList.contains('on')
  };
  if(id){ var it=byId(id); Object.assign(it,obj); toast('Item updated'); }
  else { obj.id='i'+Date.now(); DB.items.push(obj); toast('Item added'); }
  saveDB(); closeSheet(); render();
}
function deleteItem(id){
  if(!confirm('Delete this item? This cannot be undone.')) return;
  DB.items=DB.items.filter(function(i){return i.id!==id;});
  saveDB(); closeSheet(); toast('Item deleted'); render();
}
function adjustStock(id){
  var it=byId(id);
  var h='<h2>Adjust Stock<button class="x" onclick="openItemForm(\''+id+'\')">×</button></h2>';
  h+='<div class="card card-pad" style="text-align:center"><div class="muted">'+esc(it.name)+'</div>'+
     '<div style="font-size:30px;font-weight:800" class="tabular" id="adjval">'+it.stock+'</div>'+
     '<div class="muted">'+esc(it.unit)+' in stock</div></div>';
  h+='<label class="fld" style="margin-top:12px"><span class="lab">Add stock received (+)</span>'+
     '<input class="inp" id="adj_in" inputmode="numeric" placeholder="Qty received"></label>';
  h+='<label class="fld"><span class="lab">Or set exact stock count</span>'+
     '<input class="inp" id="adj_set" inputmode="numeric" placeholder="Exact count"></label>';
  h+='<button class="btn primary" onclick="applyStock(\''+id+'\')">Update Stock</button>';
  openSheet(h);
}
function applyStock(id){
  var it=byId(id);
  var add=document.getElementById('adj_in').value;
  var setv=document.getElementById('adj_set').value;
  if(setv!=='') it.stock=parseInt(setv)||0;
  else if(add!=='') it.stock=(it.stock||0)+(parseInt(add)||0);
  saveDB(); closeSheet(); toast('Stock updated'); render();
}
/* ============================================================
   BILL BUILDER — invoice & quote, line items, delivery, share
============================================================ */
var bill=null;
function openBillBuilder(isQuote){
  bill={ type:isQuote?'quote':'invoice', cust:{name:'',phone:'',addr:''},
         lines:[], discount:0, delivery:false, delCharge:0, delAddr:'', paid:0, date:nowISO() };
  TAB='bill';
  document.querySelectorAll('.navbtn').forEach(function(b){b.classList.remove('active');});
  renderBill();
  window.scrollTo(0,0);
}

function billTotals(){
  var sub=bill.lines.reduce(function(a,l){return a+l.rate*l.qty;},0);
  var disc=Number(bill.discount)||0;
  var del=bill.delivery?(Number(bill.delCharge)||0):0;
  var grand=Math.max(0,sub-disc+del);
  var paid=bill.type==='invoice'?(Number(bill.paid)||0):0;
  var bal=Math.max(0,grand-paid);
  return {sub:sub,disc:disc,del:del,grand:grand,paid:paid,bal:bal};
}

function renderBill(){
  var t=billTotals();
  var isInv=bill.type==='invoice';
  var h='';
  h+='<div class="between" style="margin-bottom:8px"><div class="section-eyebrow" style="margin:0">'+
       (isInv?'New Bill / Invoice':'New Quotation')+'</div>'+
       '<button class="btn ghost tiny" onclick="go(\'home\')">✕ Close</button></div>';

  /* type switch */
  h+='<div class="btn-row" style="margin-bottom:12px">'+
       '<button class="btn '+(isInv?'primary':'ghost')+' sm" style="flex:1" onclick="setBillType(false)">🧾 Invoice</button>'+
       '<button class="btn '+(!isInv?'steel':'ghost')+' sm" style="flex:1" onclick="setBillType(true)">📄 Quote</button>'+
     '</div>';

  /* customer */
  h+='<div class="card card-pad">'+
       '<label class="fld"><span class="lab">Customer name</span><input class="inp" id="b_name" value="'+esc(bill.cust.name)+'" placeholder="Name"></label>'+
       '<div class="grid2">'+
         '<label class="fld" style="margin:0"><span class="lab">Phone</span><input class="inp" id="b_phone" inputmode="tel" value="'+esc(bill.cust.phone)+'" placeholder="WhatsApp no."></label>'+
         '<button class="btn ghost sm" style="align-self:flex-end;height:46px" onclick="pickCustomer()">📇 Saved</button>'+
       '</div>'+
     '</div>';

  /* line items */
  h+='<div class="section-eyebrow">Items <span class="ln"></span></div><div class="card card-pad" id="b_lines">';
  if(!bill.lines.length){
    h+='<div class="muted center" style="padding:12px 0">No items yet.</div>';
  }else{
    bill.lines.forEach(function(l,idx){
      h+='<div class="lineitem">'+
          '<div class="nm">'+esc(l.name)+'<small>'+inr(l.rate)+' / '+esc(l.unit)+'</small></div>'+
          '<div class="qtybox"><button onclick="chQty('+idx+',-1)">−</button>'+
            '<input inputmode="decimal" value="'+l.qty+'" onchange="setQty('+idx+',this.value)">'+
            '<button onclick="chQty('+idx+',1)">+</button></div>'+
          '<div class="amt tabular">'+inr(l.rate*l.qty)+'</div>'+
          '<button class="rm" onclick="rmLine('+idx+')">🗑</button></div>';
    });
  }
  h+='<button class="btn primary sm" style="width:100%;margin-top:10px" onclick="pickItem()">➕ Add Item</button></div>';

  /* charges */
  h+='<div class="section-eyebrow">Charges <span class="ln"></span></div><div class="card card-pad">'+
       '<label class="fld"><span class="lab">Discount (₹)</span><input class="inp" id="b_disc" inputmode="decimal" value="'+(bill.discount||'')+'" placeholder="0" oninput="bill.discount=parseFloat(this.value)||0;updTotals()"></label>'+
       '<div class="switch" style="border-top:none;padding-top:0"><div><div class="lab">🚚 Home Delivery</div><div class="sub">Add delivery & address</div></div>'+
         '<div class="toggle'+(bill.delivery?' on':'')+'" id="b_deltog" onclick="toggleDelivery()"></div></div>'+
       '<div id="delbox" style="display:'+(bill.delivery?'block':'none')+'">'+
         '<label class="fld"><span class="lab">Delivery charge (₹)</span><input class="inp" id="b_delc" inputmode="decimal" value="'+(bill.delCharge||'')+'" placeholder="0" oninput="bill.delCharge=parseFloat(this.value)||0;updTotals()"></label>'+
         '<label class="fld" style="margin:0"><span class="lab">Delivery address</span><textarea class="inp" id="b_deladdr" placeholder="House / shop, area, landmark" oninput="bill.delAddr=this.value">'+esc(bill.delAddr)+'</textarea></label>'+
       '</div>'+
     '</div>';

  /* payment (invoice only) */
  if(isInv){
    h+='<div class="section-eyebrow">Payment <span class="ln"></span></div><div class="card card-pad">'+
         '<label class="fld" style="margin:0"><span class="lab">Amount received now (₹)</span>'+
         '<input class="inp" id="b_paid" inputmode="decimal" value="'+(bill.paid||'')+'" placeholder="0 = full credit" oninput="bill.paid=parseFloat(this.value)||0;updTotals()"></label>'+
       '</div>';
  }

  /* totals */
  h+='<div class="card card-pad" id="b_totals" style="margin-top:12px">'+billTotalsHTML(t,isInv)+'</div>';

  /* actions */
  h+='<div class="spacer"></div>';
  h+='<button class="btn wa" onclick="finalizeBill(\'wa\')">📲 Save & Share on WhatsApp</button>';
  h+='<div class="btn-row" style="margin-top:8px">'+
       '<button class="btn steel" onclick="finalizeBill(\'pdf\')">📄 Save & PDF</button>'+
       '<button class="btn ghost" onclick="finalizeBill(\'save\')">💾 Just Save</button>'+
     '</div>';
  h+='<div class="muted" style="font-size:11.5px;text-align:center;margin-top:10px">Terms (incl. “no returns after purchase”) are added automatically. Edit in More › Terms.</div>';

  document.getElementById('view').innerHTML=h;
  document.getElementById('b_name').addEventListener('input',function(){bill.cust.name=this.value;});
  document.getElementById('b_phone').addEventListener('input',function(){bill.cust.phone=this.value;});
}

function billTotalsHTML(t,isInv){
  var h='<div class="tot"><span>Subtotal</span><span class="tabular">'+inr(t.sub)+'</span></div>';
  if(t.disc) h+='<div class="tot"><span>Discount</span><span class="tabular" style="color:var(--due)">−'+inr(t.disc)+'</span></div>';
  if(t.del) h+='<div class="tot"><span>Delivery</span><span class="tabular">'+inr(t.del)+'</span></div>';
  h+='<div class="tot g"><span>Total</span><span class="tabular">'+inr(t.grand)+'</span></div>';
  if(isInv){
    h+='<div class="tot" style="margin-top:4px"><span>Paid</span><span class="tabular" style="color:var(--ok)">'+inr(t.paid)+'</span></div>';
    h+='<div class="tot" style="font-weight:800;color:'+(t.bal>0?'var(--due)':'var(--ok)')+'"><span>Balance Due</span><span class="tabular">'+inr(t.bal)+'</span></div>';
  }
  return h;
}
function updTotals(){

/* ---- aggregate customers from invoices ---- */
function customerList(){
  var map={};
  DB.invoices.forEach(function(x){
    var key=(x.cust.name||'').trim().toLowerCase()+'|'+cleanPhone(x.cust.phone);
    if(!key.trim()) return;
    if(!map[key]) map[key]={name:x.cust.name,phone:x.cust.phone,bal:0,count:0};
    if(x.type==='invoice'){ map[key].bal+=x.balance||0; map[key].count++; }
  });
  return Object.keys(map).map(function(k){return map[k];}).sort(function(a,b){return b.bal-a.bal;});
}

/* ---- finalize ---- */
function finalizeBill(action){
  if(!bill.lines.length){ toast('Add at least one item'); return; }
  var t=billTotals();
  var isInv=bill.type==='invoice';
  var no = isInv ? ('AVT-INV-'+String(DB.invSeq).padStart(4,'0')) : ('AVT-QT-'+String(DB.quoteSeq).padStart(4,'0'));
  var rec={
    id:'b'+Date.now(), no:no, type:bill.type, date:bill.date,
    cust:{name:bill.cust.name.trim()||'Cash', phone:bill.cust.phone.trim(), addr:bill.cust.addr},
    lines:bill.lines.map(function(l){return {id:l.id,name:l.name,unit:l.unit,rate:l.rate,qty:l.qty,amount:l.rate*l.qty};}),
    sub:t.sub, discount:t.disc, delivery:bill.delivery, delCharge:t.del, delAddr:bill.delAddr,
    total:t.grand, paid:t.paid, balance:t.bal, delivered:false,
    terms:DB.terms.slice()
  };
  // commit
  if(isInv){
    DB.invSeq++;
    // decrement stock for known items
    rec.lines.forEach(function(l){ if(l.id){ var it=byId(l.id); if(it){ it.stock=Math.max(0,(it.stock||0)-l.qty); } } });
  }else{ DB.quoteSeq++; }
  DB.invoices.unshift(rec);
  saveDB();

  var lowNow=lowStockItems();
  if(isInv && lowNow.length){ toast(no+' saved · '+lowNow.length+' item(s) now low on stock'); }
  else toast(no+' saved');

  if(action==='wa') shareBillWA(rec);
  else if(action==='pdf') exportBillPDF(rec);
  else { go('khata'); openBillView(rec.id); }
}

/* ---- WhatsApp text document ---- */
function billText(rec){
  var L=[]; var line='— — — — — — — — — — —';
  L.push('*'+DB.shop.name.toUpperCase()+'*');
  L.push(DB.shop.addr);
  L.push('📞 '+DB.shop.phone);
  L.push(line);
  L.push(rec.type==='invoice'?('*INVOICE*  '+rec.no):('*QUOTATION*  '+rec.no));
  L.push('Date: '+new Date(rec.date).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}));
  if(rec.cust.name) L.push('To: '+rec.cust.name);
  L.push(line);
  rec.lines.forEach(function(l,i){
    L.push((i+1)+'. '+l.name);
    L.push('    '+l.qty+' '+l.unit+' × '+inr(l.rate)+' = *'+inr(l.amount)+'*');
  });
  L.push(line);
  L.push('Subtotal: '+inr(rec.sub));
  if(rec.discount) L.push('Discount: −'+inr(rec.discount));
  if(rec.delCharge) L.push('Delivery: '+inr(rec.delCharge));
  L.push('*TOTAL: '+inr(rec.total)+'*');
  if(rec.type==='invoice'){
    L.push('Paid: '+inr(rec.paid));
    L.push('*Balance Due: '+inr(rec.balance)+'*');
  }
  if(rec.delivery && rec.delAddr){ L.push(line); L.push('🚚 Delivery to: '+rec.delAddr); }
  L.push(line);
  L.push('_Terms & Conditions_');
  rec.terms.forEach(function(t){ L.push('• '+t); });
  L.push(line);
  L.push('Thank you! — '+DB.shop.name);
  return L.join('\n');
}
function shareBillWA(rec){ openWA(rec.cust.phone, billText(rec)); }

/* ---- PDF via jsPDF (lazy) ---- */
var _jspdf=null;
function loadJsPDF(){
  return new Promise(function(res,rej){
    if(window.jspdf&&window.jspdf.jsPDF){return res(window.jspdf.jsPDF);}
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=function(){ (window.jspdf&&window.jspdf.jsPDF)?res(window.jspdf.jsPDF):rej(); };
    s.onerror=rej; document.head.appendChild(s);
  });
}
function exportBillPDF(rec){
  toast('Building PDF…');
  loadJsPDF().then(function(jsPDF){
    var doc=new jsPDF({unit:'pt',format:'a4'});
    var W=595, m=40, y=46;
    doc.setFont('helvetica','bold'); doc.setFontSize(20); doc.setTextColor(27,26,23);
    doc.text(DB.shop.name.toUpperCase(),m,y);
    doc.setDrawColor(212,121,27); doc.setLineWidth(3); doc.line(m,y+6,m+150,y+6);
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(90,90,90);
    doc.text(DB.shop.addr,m,y+22); doc.text('Phone: '+DB.shop.phone,m,y+34);
    doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(42,48,59);
    doc.text(rec.type==='invoice'?'INVOICE':'QUOTATION', W-m, y, {align:'right'});
    doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(90,90,90);
    doc.text(rec.no, W-m, y+16,{align:'right'});
    doc.text(new Date(rec.date).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}), W-m, y+28,{align:'right'});
    y+=56;
    doc.setTextColor(27,26,23); doc.setFont('helvetica','bold'); doc.setFontSize(10);
    doc.text('Bill To: '+(rec.cust.name||'Cash'),m,y);
    if(rec.cust.phone){ doc.setFont('helvetica','normal'); doc.text(rec.cust.phone,m,y+13); y+=8; }
    y+=22;
    // table head
    doc.setFillColor(42,48,59); doc.rect(m,y-12,W-2*m,20,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
    doc.text('ITEM',m+6,y+2); doc.text('QTY',W-220,y+2,{align:'right'});
    doc.text('RATE',W-130,y+2,{align:'right'}); doc.text('AMOUNT',W-m-6,y+2,{align:'right'});
    y+=20;
    doc.setTextColor(40,40,40); doc.setFont('helvetica','normal'); doc.setFontSize(9.5);
    rec.lines.forEach(function(l){
      if(y>770){ doc.addPage(); y=50; }
      doc.text(String(l.name).slice(0,46),m+6,y);
      doc.text(l.qty+' '+l.unit,W-220,y,{align:'right'});
      doc.text(inrPlain(l.rate),W-130,y,{align:'right'});
      doc.text(inrPlain(l.amount),W-m-6,y,{align:'right'});
      doc.setDrawColor(235,235,235); doc.line(m,y+5,W-m,y+5);
      y+=18;
    });
    y+=6;
    function totRow(lbl,val,bold,col){
      doc.setFont('helvetica',bold?'bold':'normal'); doc.setFontSize(bold?11:9.5);
      if(col)doc.setTextColor(col[0],col[1],col[2]); else doc.setTextColor(40,40,40);
      doc.text(lbl,W-170,y,{align:'right'}); doc.text(val,W-m-6,y,{align:'right'}); y+=16;
    }
    totRow('Subtotal',inrPlain(rec.sub));
    if(rec.discount) totRow('Discount','-'+inrPlain(rec.discount));
    if(rec.delCharge) totRow('Delivery',inrPlain(rec.delCharge));
    doc.setDrawColor(42,48,59); doc.setLineWidth(1.4); doc.line(W-200,y-4,W-m,y-4);
    totRow('TOTAL',inrPlain(rec.total),true);
    if(rec.type==='invoice'){ totRow('Paid',inrPlain(rec.paid)); totRow('Balance Due',inrPlain(rec.balance),true,rec.balance>0?[192,57,43]:[46,125,70]); }
    y+=14;
    if(rec.delivery&&rec.delAddr){ doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(90,90,90); doc.text('Delivery to: '+rec.delAddr,m,y); y+=18; }
    doc.setDrawColor(200,200,200); doc.setLineWidth(.5); doc.line(m,y,W-m,y); y+=14;
    doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(80,80,80);
    doc.text('TERMS & CONDITIONS',m,y); y+=12;
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(110,110,110);
    rec.terms.forEach(function(t){ doc.text('•  '+t,m,y); y+=11; });
    var fn=rec.no+'.pdf';
    var blob=doc.output('blob');
    sharePDF(blob,fn,rec);
  }).catch(function(){ toast('PDF needs internet once. Opening print view…'); printBill(rec); });
}
function inrPlain(n){ return 'Rs '+(Number(n)||0).toLocaleString('en-IN'); }

function sharePDF(blob,fn,rec){
  var file=new File([blob],fn,{type:'application/pdf'});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file],title:rec.no,text:DB.shop.name+' '+rec.no}).catch(function(){ dlBlob(blob,fn); });
  }else{ dlBlob(blob,fn); toast('PDF downloaded — attach it in WhatsApp'); }
}
function dlBlob(blob,fn){ var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=fn; a.click(); setTimeout(function(){URL.revokeObjectURL(a.href);},4000); }

  h+='<button class="btn wa" onclick="shareBillWA(DB.invoices.find(function(i){return i.id===\''+id+'\'}))">📲 Share on WhatsApp</button>';
  h+='<div class="btn-row" style="margin-top:8px">'+
       '<button class="btn steel" onclick="exportBillPDF(DB.invoices.find(function(i){return i.id===\''+id+'\'}))">📄 PDF</button>'+
       '<button class="btn ghost" onclick="printBill(DB.invoices.find(function(i){return i.id===\''+id+'\'}))">🖨 Print</button>'+
     '</div>';
  if(x.type==='invoice' && x.balance>0){
    h+='<button class="btn primary" style="margin-top:8px" onclick="recordPayment(\''+id+'\')">💰 Record Payment</button>';
  }
  h+='<button class="btn danger" style="margin-top:8px" onclick="deleteBill(\''+id+'\')">Delete bill</button>';
  openSheet(h);
}
function recordPayment(id){
  var x=DB.invoices.find(function(i){return i.id===id;});
  var h='<h2>Record Payment<button class="x" onclick="openBillView(\''+id+'\')">×</button></h2>'+
    '<div class="card card-pad center"><div class="muted">'+esc(x.cust.name)+' · '+x.no+'</div>'+
    '<div style="font-size:26px;font-weight:800;color:var(--due)" class="tabular">'+inr(x.balance)+'</div><div class="muted">balance due</div></div>'+
    '<label class="fld" style="margin-top:12px"><span class="lab">Amount received now (₹)</span><input class="inp" id="pay_amt" inputmode="decimal" placeholder="Enter amount"></label>'+
    '<div class="btn-row"><button class="btn ghost sm" onclick="document.getElementById(\'pay_amt\').value='+x.balance+'">Full '+inr(x.balance)+'</button></div>'+
    '<button class="btn primary" style="margin-top:10px" onclick="applyPayment(\''+id+'\')">Save Payment</button>';
  openSheet(h);
}
function applyPayment(id){
  var x=DB.invoices.find(function(i){return i.id===id;});
  var amt=parseFloat(document.getElementById('pay_amt').value)||0;
  if(amt<=0){toast('Enter amount');return;}
  x.paid=Math.min(x.total,(x.paid||0)+amt); x.balance=Math.max(0,x.total-x.paid);
  saveDB(); closeSheet(); toast('Payment recorded'); render();
  if(x.cust.phone && confirm('Send payment confirmation on WhatsApp?')){
    openWA(x.cust.phone,'Received '+inr(amt)+' against '+x.no+'. '+(x.balance>0?'Balance now '+inr(x.balance)+'.':'Account cleared. Thank you!')+'\n— '+DB.shop.name);
  }
}
function deleteBill(id){
  if(!confirm('Delete this bill permanently?')) return;
  DB.invoices=DB.invoices.filter(function(i){return i.id!==id;});
  saveDB(); closeSheet(); toast('Deleted'); render();
}
/* ============================================================
   RATE LIST SHARING (WhatsApp)
============================================================ */
function shareRateList(scope,cat){
  var items=DB.items.slice();
  var title='RATE LIST';
  if(scope==='featured'){ items=items.filter(function(i){return i.feat||FEATURED_CATS.indexOf(i.cat)>=0;}); title='SPECIALITY RATE LIST'; }
  if(scope==='cat'){ items=items.filter(function(i){return i.cat===cat;}); title=cat.toUpperCase()+' RATE LIST'; }
  if(!items.length){toast('No items to share');return;}
  var groups={};
  items.forEach(function(i){ (groups[i.cat]=groups[i.cat]||[]).push(i); });
  var L=['*'+DB.shop.name.toUpperCase()+'*',DB.shop.addr,'📞 '+DB.shop.phone,'','*'+title+'*','('+todayStr()+')',''];
  Object.keys(groups).sort().forEach(function(c){
    L.push('*'+c+'*');
    groups[c].sort(function(a,b){return a.name.localeCompare(b.name);}).forEach(function(i){
      L.push('• '+i.name+' — '+inr(i.sell)+'/'+i.unit);
    });
    L.push('');
  });
  L.push('_Rates subject to change. Items not returnable after purchase._');
  L.push('— '+DB.shop.name);
  openWA('', L.join('\n'));
}

   MORE — settings, terms, rate list, backup, install
============================================================ */

     '<div class="bt">'+(DB.lastBackup?('Last backup '+(bk===0?'today':bk+' day(s) ago')):'No backup taken yet')+
     (bk>=7?' — backup due':'')+'</div></div>';
  h+='<div class="card card-pad">'+
       '<button class="btn primary" onclick="exportData()">⬇️ Backup now (save file)</button>'+

       '</div>'+

       '<div class="muted" style="font-size:11.5px;margin-top:8px">Backup saves a file to your phone. Keep a copy in Google Drive / WhatsApp so data is safe even if the browser is cleared.</div>'+

  h+='<div class="section-eyebrow">Share Rate List <span class="ln"></span></div>';

       '<button class="btn wa" onclick="shareRateList(\'all\')">📋 Full rate list → WhatsApp</button>'+

  h+='<div class="card card-pad">'+
       '<label class="fld"><span class="lab">Shop name</span><input class="inp" id="s_name" value="'+esc(DB.shop.name)+'"></label>'+
       '<label class="fld"><span class="lab">Address</span><input class="inp" id="s_addr" value="'+esc(DB.shop.addr)+'"></label>'+
       '<label class="fld"><span class="lab">Phone</span><input class="inp" id="s_phone" value="'+esc(DB.shop.phone)+'"></label>'+
       '<label class="fld" style="margin:0"><span class="lab">GST / extra line (optional)</span><input class="inp" id="s_gst" value="'+esc(DB.shop.gst)+'"></label>'+
       '<button class="btn primary sm" style="margin-top:10px;width:100%" onclick="saveShop()">Save shop details</button>'+
     '</div>';
  h+='<div class="section-eyebrow">Terms &amp; Conditions <span class="ln"></span></div>';
  h+='<div class="card card-pad">'+
       '<div class="muted" style="font-size:12px;margin-bottom:6px">Printed on every quote &amp; invoice. One per line.</div>'+
       '<textarea class="inp" id="s_terms" style="min-height:120px">'+esc(DB.terms.join('\n'))+'</textarea>'+
       '<button class="btn primary sm" style="margin-top:10px;width:100%" onclick="saveTerms()">Save terms</button>'+
     '</div>';
  h+='<div class="section-eyebrow">App <span class="ln"></span></div>';
  h+='<div class="card card-pad">'+
       '<button class="btn steel" id="installBtn" onclick="promptInstall()" style="display:none">📲 Install on home screen</button>'+
       '<div id="installHint" class="muted" style="font-size:12.5px">To add the icon to your home screen: open this page in Chrome → menu (⋮) → <b>Add to Home screen</b>.</div>'+
       '<div class="hr"></div>'+
       '<button class="btn danger sm" style="width:100%" onclick="resetAll()">Reset all data</button>'+
     '</div>';
  h+='<div class="center muted" style="font-size:11px;margin-top:16px">Avon Traders · stored locally on this device<br>'+(Store.persistent?'✅ Persistent storage active':'⚠️ Preview mode — deploy for permanent storage')+'</div>';
  return h;
}
function saveShop(){
  DB.shop.name=document.getElementById('s_name').value.trim()||DB.shop.name;
  DB.shop.addr=document.getElementById('s_addr').value.trim();
  DB.shop.phone=document.getElementById('s_phone').value.trim();
  DB.shop.gst=document.getElementById('s_gst').value.trim();
  saveDB(); toast('Shop details saved');
}
function saveTerms(){
  DB.terms=document.getElementById('s_terms').value.split('\n').map(function(s){return s.trim();}).filter(Boolean);
  if(!DB.terms.length) DB.terms=['Items will not be returned after purchase.'];
  saveDB(); toast('Terms saved');
}
function exportData(){
  DB.lastBackup=Date.now(); saveDB();
  var data=JSON.stringify(DB,null,2);
  var blob=new Blob([data],{type:'application/json'});
  var fn='AvonTraders-backup-'+new Date().toISOString().slice(0,10)+'.json';
  if(navigator.canShare){
    var file=new File([blob],fn,{type:'application/json'});
    if(navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:'Avon Traders backup'}).then(function(){toast('Backup shared');render();}).catch(function(){dlBlob(blob,fn);toast('Backup saved');render();});
      return;
    }
  }
  dlBlob(blob,fn); toast('Backup file saved'); render();
}
function importData(input){
  var f=input.files[0]; if(!f) return;
  var r=new FileReader();
  r.onload=function(){
    try{
      var d=JSON.parse(r.result);
      if(!d.items||!d.invoices) throw 0;
      if(!confirm('Restore this backup? It will replace current data.')) return;
      DB=d; saveDB(); toast('Backup restored'); go('home');
    }catch(e){ toast('Invalid backup file'); }
  };
  r.readAsText(f); input.value='';
}
function setBackupReminder(){
  toast('Tip: set a weekly alarm every Sunday to tap “Backup now” 🗓️');
}
function resetAll(){
  if(!confirm('This deletes ALL items, bills and settings on this device. Continue?')) return;
  if(!confirm('Are you sure? Take a backup first if needed.')) return;
  DB=JSON.parse(JSON.stringify(DEFAULTS)); DB.items=seedItems(); saveDB(); go('home'); toast('Reset done');
}

var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){ e.preventDefault(); deferredPrompt=e;
  var b=document.getElementById('installBtn'); if(b){b.style.display='block';var hn=document.getElementById('installHint');if(hn)hn.style.display='none';}
});
function promptInstall(){ if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt=null; } else toast('Use Chrome menu → Add to Home screen'); }

if('serviceWorker' in navigator){
  window.addEventListener('load',function(){ navigator.serviceWorker.register('service-worker.js').catch(function(){}); });
}

loadDB();
go('home');
